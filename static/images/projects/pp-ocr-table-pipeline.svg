<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">InVision OCR table reconstruction pipeline</title>
  <desc id="desc">Table reconstruction stage plan from table region through OCR base structure, internal candidates, hybrid refinements, fusion, headers, and final output.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 Z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .node rect { stroke-width: 2; rx: 16; }
      .node text { fill: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; font-weight: 750; }
      .node .sub { fill: #475569; font-size: 13px; font-weight: 600; }
      .edge { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrow); stroke-dasharray: 8 8; }
      .note { fill: #475569; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; font-weight: 700; }
    </style>
  </defs>
  <rect class="bg" width="1280" height="720" rx="28" />
  <text class="note" x="70" y="60">Default stage plan: candidates are accumulated on one shared TablePipelineContext.</text>

  <g class="node" transform="translate(70 112)">
    <rect width="210" height="104" fill="#e0f2fe" stroke="#38bdf8" />
    <text x="24" y="34"><tspan x="24" dy="0">TABLE Region</tspan><tspan class="sub" x="24" dy="25">layout bbox</tspan><tspan class="sub" x="24" dy="21">OCR text results</tspan></text>
  </g>
  <g class="node" transform="translate(70 352)">
    <rect width="210" height="104" fill="#e0f2fe" stroke="#38bdf8" />
    <text x="24" y="34"><tspan x="24" dy="0">Context</tspan><tspan class="sub" x="24" dy="25">metadata</tspan><tspan class="sub" x="24" dy="21">candidate history</tspan></text>
  </g>

  <g class="node" transform="translate(360 92)">
    <rect width="212" height="96" fill="#dcfce7" stroke="#22c55e" />
    <text x="22" y="33"><tspan x="22" dy="0">base_structure</tspan><tspan class="sub" x="22" dy="25">OCR internal rows</tspan><tspan class="sub" x="22" dy="20">columns and cells</tspan></text>
  </g>
  <g class="node" transform="translate(360 232)">
    <rect width="212" height="96" fill="#fef3c7" stroke="#f59e0b" />
    <text x="22" y="33"><tspan x="22" dy="0">lattice candidates</tspan><tspan class="sub" x="22" dy="25">image lines</tspan><tspan class="sub" x="22" dy="20">grid variants</tspan></text>
  </g>
  <g class="node" transform="translate(360 372)">
    <rect width="212" height="96" fill="#ffedd5" stroke="#fb923c" />
    <text x="22" y="33"><tspan x="22" dy="0">selection rules</tspan><tspan class="sub" x="22" dy="25">coverage</tspan><tspan class="sub" x="22" dy="20">text match</tspan></text>
  </g>
  <g class="node" transform="translate(360 512)">
    <rect width="212" height="96" fill="#fce7f3" stroke="#ec4899" />
    <text x="22" y="33"><tspan x="22" dy="0">Hybrid refine</tspan><tspan class="sub" x="22" dy="25">fallback or force</tspan><tspan class="sub" x="22" dy="20">candidate compare</tspan></text>
  </g>

  <g class="node" transform="translate(694 112)">
    <rect width="230" height="104" fill="#ede9fe" stroke="#8b5cf6" />
    <text x="24" y="34"><tspan x="24" dy="0">Refinements</tspan><tspan class="sub" x="24" dy="25">dense summary</tspan><tspan class="sub" x="24" dy="21">list tables</tspan></text>
  </g>
  <g class="node" transform="translate(694 312)">
    <rect width="230" height="104" fill="#ecfeff" stroke="#06b6d4" />
    <text x="24" y="34"><tspan x="24" dy="0">Text Fusion</tspan><tspan class="sub" x="24" dy="25">selected grid</tspan><tspan class="sub" x="24" dy="21">OCR text reassigned</tspan></text>
  </g>
  <g class="node" transform="translate(694 512)">
    <rect width="230" height="104" fill="#f1f5f9" stroke="#64748b" />
    <text x="24" y="34"><tspan x="24" dy="0">Headers</tspan><tspan class="sub" x="24" dy="25">row / column roles</tspan><tspan class="sub" x="24" dy="21">preview metadata</tspan></text>
  </g>

  <g class="node" transform="translate(1030 222)">
    <rect width="200" height="132" fill="#f0fdf4" stroke="#16a34a" />
    <text x="24" y="38"><tspan x="24" dy="0">Final Table</tspan><tspan class="sub" x="24" dy="27">rows / cells</tspan><tspan class="sub" x="24" dy="22">markdown / html</tspan><tspan class="sub" x="24" dy="22">debug metadata</tspan></text>
  </g>

  <path class="edge" d="M280 164 H360" />
  <path class="edge-soft" d="M175 216 V352" />
  <path class="edge" d="M466 188 V232" />
  <path class="edge" d="M466 328 V372" />
  <path class="edge" d="M466 468 V512" />
  <path class="edge" d="M572 560 H634 V164 H694" />
  <path class="edge" d="M924 164 H980 V288 H1030" />
  <path class="edge" d="M809 216 V312" />
  <path class="edge" d="M809 416 V512" />
  <path class="edge" d="M924 564 H990 V354 H1030" />
  <path class="edge-soft" d="M280 404 H320 V560 H360" />
</svg>
