<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">booxTory and arti product portfolio map</title>
  <desc id="desc">Product-centered map showing booxTory and arti as the two public project names, with reading AI, storytelling, and common AI service capabilities underneath.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .line { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .soft { fill: none; stroke: #94a3b8; stroke-width: 2.5; marker-end: url(#arrow); }
      .node rect { fill: #ffffff; stroke-width: 2.5; rx: 8; }
      .hub rect { stroke: #0f766e; fill: #ecfdf5; }
      .boox rect { stroke: #2563eb; fill: #eff6ff; }
      .arti rect { stroke: #c2410c; fill: #fff7ed; }
      .common rect { stroke: #7c3aed; fill: #faf5ff; }
      .out rect { stroke: #334155; fill: #f1f5f9; }
      text { font-family: Inter, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #0f172a; }
      .title { font-size: 28px; font-weight: 800; }
      .label { font-size: 18px; font-weight: 800; }
      .sub { font-size: 14px; font-weight: 600; fill: #475569; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="680"/>
  <text class="title" x="60" y="58">ArtygenSpace Product Portfolio</text>
  <text class="sub" x="60" y="86">공개 시리즈는 booxTory와 arti를 중심으로 정리합니다.</text>

  <g class="node hub" transform="translate(455 92)">
    <rect width="290" height="112"/>
    <text class="label" x="145" y="38" text-anchor="middle">
      <tspan x="145" dy="0">ArtygenSpace</tspan>
      <tspan x="145" dy="28">AI 제품 개발</tspan>
    </text>
    <text class="sub" x="145" y="88" text-anchor="middle">2024.07 - 2025.07</text>
  </g>

  <path class="line" d="M600 204 V248"/>
  <path class="soft" d="M600 248 H302 V295"/>
  <path class="soft" d="M600 248 H898 V295"/>

  <g class="node boox" transform="translate(160 295)">
    <rect width="284" height="122"/>
    <text class="label" x="142" y="40" text-anchor="middle">
      <tspan x="142" dy="0">booxTory</tspan>
      <tspan x="142" dy="28">AI 독서 경험</tspan>
    </text>
    <text class="sub" x="142" y="94" text-anchor="middle">CES Best of Innovation</text>
  </g>

  <g class="node arti" transform="translate(756 295)">
    <rect width="284" height="122"/>
    <text class="label" x="142" y="40" text-anchor="middle">
      <tspan x="142" dy="0">arti</tspan>
      <tspan x="142" dy="28">생성형 스토리텔링</tspan>
    </text>
    <text class="sub" x="142" y="94" text-anchor="middle">CES Honoree</text>
  </g>

  <path class="soft" d="M302 417 V468"/>
  <path class="soft" d="M898 417 V468"/>

  <g class="node common" transform="translate(70 468)">
    <rect width="216" height="116"/>
    <text class="label" x="108" y="36" text-anchor="middle">
      <tspan x="108" dy="0">책 페이지</tspan>
      <tspan x="108" dy="26">이해</tspan>
    </text>
    <text class="sub" x="108" y="86" text-anchor="middle">OCR / Layout</text>
  </g>
  <g class="node common" transform="translate(306 468)">
    <rect width="216" height="116"/>
    <text class="label" x="108" y="36" text-anchor="middle">
      <tspan x="108" dy="0">개인화</tspan>
      <tspan x="108" dy="26">독서 AI</tspan>
    </text>
    <text class="sub" x="108" y="86" text-anchor="middle">RAG / TTS / Quiz</text>
  </g>
  <g class="node common" transform="translate(542 468)">
    <rect width="216" height="116"/>
    <text class="label" x="108" y="36" text-anchor="middle">
      <tspan x="108" dy="0">공통 AI</tspan>
      <tspan x="108" dy="26">서비스</tspan>
    </text>
    <text class="sub" x="108" y="86" text-anchor="middle">API / Queue / Store</text>
  </g>
  <g class="node common" transform="translate(778 468)">
    <rect width="216" height="116"/>
    <text class="label" x="108" y="36" text-anchor="middle">
      <tspan x="108" dy="0">이야기와</tspan>
      <tspan x="108" dy="26">이미지</tspan>
    </text>
    <text class="sub" x="108" y="86" text-anchor="middle">Story / Image / Voice</text>
  </g>
  <g class="node common" transform="translate(1014 468)">
    <rect width="116" height="116"/>
    <text class="label" x="58" y="36" text-anchor="middle">
      <tspan x="58" dy="0">PDF</tspan>
      <tspan x="58" dy="26">Gallery</tspan>
    </text>
    <text class="sub" x="58" y="86" text-anchor="middle">저장</text>
  </g>

  <path class="soft" d="M302 417 V442 H178 V468"/>
  <path class="soft" d="M302 417 V442 H414 V468"/>
  <path class="soft" d="M898 417 V442 H886 V468"/>
  <path class="soft" d="M898 417 V442 H1072 V468"/>
  <path class="line" d="M600 248 V468"/>
</svg>
