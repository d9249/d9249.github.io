<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Market Intelligence runtime flow</title>
  <desc id="desc">RFP documents feed a planner, parallel research agents, a synthesizer, S3 storage, and Bedrock Knowledge Base sync.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .zone { fill: #ffffff; stroke: #d8dee9; stroke-width: 2; rx: 22; }
      .zone-title { fill: #475569; font: 800 18px system-ui, -apple-system, Segoe UI, sans-serif; }
      .node rect { stroke-width: 2; rx: 16; }
      .node text { fill: #0f172a; font: 700 18px system-ui, -apple-system, Segoe UI, sans-serif; }
      .node .sub { fill: #475569; font: 500 14px system-ui, -apple-system, Segoe UI, sans-serif; }
      .input rect { fill: #ecfeff; stroke: #0891b2; }
      .agent rect { fill: #fff7ed; stroke: #ea580c; }
      .parallel rect { fill: #f0fdf4; stroke: #16a34a; }
      .data rect { fill: #eef2ff; stroke: #4f46e5; }
      .ai rect { fill: #fdf2f8; stroke: #db2777; }
      .line { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .label { fill: #64748b; font: 600 13px system-ui, -apple-system, Segoe UI, sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <rect class="zone" x="42" y="54" width="356" height="640"/>
  <text class="zone-title" x="72" y="92">Input and planning</text>
  <rect class="zone" x="462" y="54" width="356" height="640"/>
  <text class="zone-title" x="492" y="92">Parallel intelligence agents</text>
  <rect class="zone" x="882" y="54" width="356" height="640"/>
  <text class="zone-title" x="912" y="92">Reports and knowledge</text>

  <g class="node input" transform="translate(82 130)">
    <rect width="276" height="98"/>
    <text x="24" y="36"><tspan>RFP Documents</tspan></text>
    <text class="sub" x="24" y="62"><tspan>S3 00_input_data</tspan></text>
    <text class="sub" x="24" y="82"><tspan>docx, pdf, json, txt</tspan></text>
  </g>
  <g class="node agent" transform="translate(82 300)">
    <rect width="276" height="112"/>
    <text x="24" y="36"><tspan>Planner Agent</tspan></text>
    <text class="sub" x="24" y="62"><tspan>competitors and keywords</tspan></text>
    <text class="sub" x="24" y="82"><tspan>tech and market topics</tspan></text>
    <text class="sub" x="24" y="102"><tspan>execution priority</tspan></text>
  </g>

  <g class="node parallel" transform="translate(502 112)">
    <rect width="276" height="98"/>
    <text x="24" y="36"><tspan>Researcher</tspan></text>
    <text class="sub" x="24" y="62"><tspan>market search results</tspan></text>
    <text class="sub" x="24" y="82"><tspan>findings and trends</tspan></text>
  </g>
  <g class="node parallel" transform="translate(502 282)">
    <rect width="276" height="98"/>
    <text x="24" y="36"><tspan>Competitor</tspan></text>
    <text class="sub" x="24" y="62"><tspan>company search and news</tspan></text>
    <text class="sub" x="24" y="82"><tspan>threats and opportunities</tspan></text>
  </g>
  <g class="node parallel" transform="translate(502 452)">
    <rect width="276" height="98"/>
    <text x="24" y="36"><tspan>Tech Analyst</tspan></text>
    <text class="sub" x="24" y="62"><tspan>technology trends</tspan></text>
    <text class="sub" x="24" y="82"><tspan>use cases and risks</tspan></text>
  </g>

  <g class="node agent" transform="translate(922 150)">
    <rect width="276" height="112"/>
    <text x="24" y="36"><tspan>Synthesizer</tspan></text>
    <text class="sub" x="24" y="62"><tspan>executive summary</tspan></text>
    <text class="sub" x="24" y="82"><tspan>recommendations</tspan></text>
    <text class="sub" x="24" y="102"><tspan>action items</tspan></text>
  </g>
  <g class="node data" transform="translate(922 350)">
    <rect width="276" height="112"/>
    <text x="24" y="36"><tspan>S3 Reports</tspan></text>
    <text class="sub" x="24" y="62"><tspan>workflows and plans</tspan></text>
    <text class="sub" x="24" y="82"><tspan>daily updates</tspan></text>
    <text class="sub" x="24" y="102"><tspan>source URL filtering</tspan></text>
  </g>
  <g class="node ai" transform="translate(922 550)">
    <rect width="276" height="98"/>
    <text x="24" y="36"><tspan>Bedrock KB Sync</tspan></text>
    <text class="sub" x="24" y="62"><tspan>market intelligence KB</tspan></text>
    <text class="sub" x="24" y="82"><tspan>ingestion jobs</tspan></text>
  </g>

  <path class="line" d="M220 228 V300"/>
  <path class="line" d="M358 356 H430 V161 H502"/>
  <path class="line" d="M358 356 H502"/>
  <path class="line" d="M358 356 H430 V501 H502"/>
  <text class="label" x="386" y="338">shared plan</text>
  <path class="line" d="M778 161 H922"/>
  <path class="line" d="M778 331 H850 V206 H922"/>
  <path class="line" d="M778 501 H850 V206 H922"/>
  <path class="line" d="M1060 262 V350"/>
  <path class="line" d="M1060 462 V550"/>
</svg>
