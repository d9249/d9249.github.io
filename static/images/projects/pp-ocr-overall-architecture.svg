<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="900" viewBox="0 0 2000 900" role="img" aria-labelledby="t d">
  <title id="t">InVision OCR overall architecture — paper figure style</title>
  <desc id="d">Documents are recognized and reassembled by the OCR engine, table regions are reconstructed through candidate generation, comparison and selection, and quality is proven by a TEDS benchmark console before secure encrypted delivery.</desc>
  <defs>
    <marker id="sage" viewBox="0 0 12 12" refX="8" refY="6" markerWidth="4.5" markerHeight="4.5" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 z" fill="#b7cfb2"/>
    </marker>
    <marker id="dark" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 z" fill="#2f3b45"/>
    </marker>
    <style>
      .hdr  { font: italic 700 27px Georgia, "Times New Roman", serif; fill: #17222b; }
      .hdr2 { font: 700 20px Georgia, "Times New Roman", serif; fill: #17222b; }
      .sub  { font: italic 500 15px Georgia, serif; fill: #5c6a75; }
      .lbl  { font: 600 14.5px -apple-system, "Segoe UI", sans-serif; fill: #2f3b45; }
      .sml  { font: 500 12.5px -apple-system, "Segoe UI", sans-serif; fill: #5c6a75; }
      .step { font: 800 19px Georgia, serif; fill: #c2571a; }
      .grpB { fill: #fdfefe; stroke: #4a7fa5; stroke-width: 2.5; stroke-dasharray: 11 8; }
      .grpK { fill: none; stroke: #333c44; stroke-width: 2.5; stroke-dasharray: 9 7; }
      .pill { fill: #ffffff; stroke: #333c44; stroke-width: 2; stroke-dasharray: 7 5; }
      .peach{ fill: #fdefe2; stroke: #d9b38c; stroke-width: 1.6; }
      .blue { fill: #e8f1fa; stroke: #a9c6e0; stroke-width: 1.6; }
      .purp { fill: #efe9f7; stroke: #c3aede; stroke-width: 1.6; }
      .green{ fill: #e6f2e8; stroke: #a9cdb1; stroke-width: 1.6; }
      .amber{ fill: #fdf3dd; stroke: #dfc084; stroke-width: 1.8; }
      .flow { fill: none; stroke: #c9dcc5; stroke-width: 15; stroke-linecap: round; marker-end: url(#sage); }
      .thin { fill: none; stroke: #2f3b45; stroke-width: 2.2; marker-end: url(#dark); }
      .ink  { stroke: #2f3b45; stroke-width: 1.8; fill: #fff; }
    </style>
  </defs>
  <rect width="2000" height="900" fill="#ffffff"/>

  <!-- ===================== INPUT DOCUMENTS ===================== -->
  <rect class="grpK" x="42" y="150" width="180" height="620" rx="18"/>
  <text class="hdr2" x="60" y="136">Input Documents</text>
  <g>
    <g transform="translate(85,230)">
      <path class="ink" d="M0 0 H62 L82 20 V92 H0 Z"/><path class="ink" d="M62 0 V20 H82" fill="none"/>
      <circle cx="28" cy="46" r="12" fill="#fdefe2" stroke="#d9b38c" stroke-width="2"/><path d="M16 76 L34 56 L48 68 L60 54 L66 76 Z" fill="#e6f2e8" stroke="#a9cdb1" stroke-width="2"/>
      <text class="lbl" x="20" y="118">IMG</text>
    </g>
    <g transform="translate(85,410)">
      <path class="ink" d="M0 0 H62 L82 20 V92 H0 Z"/><path class="ink" d="M62 0 V20 H82" fill="none"/>
      <line x1="14" y1="38" x2="66" y2="38" stroke="#8a97a1" stroke-width="3"/><line x1="14" y1="54" x2="66" y2="54" stroke="#8a97a1" stroke-width="3"/><line x1="14" y1="70" x2="48" y2="70" stroke="#8a97a1" stroke-width="3"/>
      <text class="lbl" x="20" y="118">PDF</text>
    </g>
    <g transform="translate(85,590)">
      <path class="ink" d="M0 0 H62 L82 20 V92 H0 Z"/><path class="ink" d="M62 0 V20 H82" fill="none"/>
      <g fill="#e8f1fa" stroke="#a9c6e0" stroke-width="2">
        <rect x="34" y="28" width="14" height="12"/><rect x="34" y="46" width="14" height="12"/><rect x="34" y="64" width="14" height="12"/>
      </g>
      <text class="lbl" x="22" y="118">ZIP</text>
    </g>
  </g>
  <path class="flow" d="M228 460 H262"/>

  <!-- ===================== 1) OCR & DOCUMENT RECOVERY ===================== -->
  <text class="step" x="290" y="136">1)</text>
  <text class="hdr" x="322" y="136">OCR &amp; Document Recovery</text>
  <rect class="grpB" x="272" y="150" width="440" height="620" rx="20"/>
  <text class="sub" x="296" y="184">InVision OCR Engine · FastAPI + Next.js 콘솔</text>

  <rect class="blue" x="312" y="224" width="360" height="76" rx="12"/>
  <text class="lbl" x="330" y="254">Layout Analysis</text>
  <text class="sml" x="330" y="278">영역 · 표 · 텍스트 블록 검출</text>
  <path class="thin" d="M492 300 V330"/>

  <rect class="peach" x="312" y="334" width="360" height="76" rx="12"/>
  <text class="lbl" x="330" y="364">InVision OCR Engine</text>
  <text class="sml" x="330" y="388">텍스트 + bbox 좌표 추출 · 영역 지정 OCR</text>
  <path class="thin" d="M492 410 V440"/>

  <rect class="green" x="312" y="444" width="360" height="76" rx="12"/>
  <text class="lbl" x="330" y="474">Document Reassembly</text>
  <text class="sml" x="330" y="498">parser 기반 문서 재조립</text>
  <path class="thin" d="M492 520 V550"/>

  <rect class="purp" x="312" y="554" width="360" height="76" rx="12"/>
  <text class="lbl" x="330" y="584">Operations Surface</text>
  <text class="sml" x="330" y="608">검수 · 이력 · 재처리 · 템플릿 리포트</text>

  <text class="sml" x="312" y="672">배치 처리 · 관리자 운영(계정 · 권한 · 설정)</text>
  <text class="sml" x="312" y="694">템플릿 추출: 가이드 기반 위치 보정 · PDF 폴백</text>

  <path class="flow" d="M718 460 H752"/>

  <!-- ===================== 2) TABLE STRUCTURE RECONSTRUCTION ===================== -->
  <text class="step" x="780" y="136">2)</text>
  <text class="hdr" x="812" y="136">Table Structure Reconstruction</text>
  <rect class="grpB" x="762" y="150" width="520" height="620" rx="20"/>
  <text class="sub" x="786" y="184">표 영역별 후보 생성 → 비교 → 선택</text>

  <rect class="grpK" x="786" y="212" width="296" height="384" rx="16"/>
  <text class="hdr2" x="806" y="246">Candidate Generation</text>

  <rect class="peach" x="806" y="264" width="236" height="64" rx="10"/>
  <text class="lbl" x="822" y="290">선분 기반 Lattice</text>
  <text class="sml" x="822" y="312">가로 · 세로 선분 격자</text>

  <rect class="blue" x="806" y="342" width="236" height="64" rx="10"/>
  <text class="lbl" x="822" y="368">bbox 기반 Grouping</text>
  <text class="sml" x="822" y="390">행 간격 · 열 정렬 추정</text>

  <rect class="purp" x="806" y="420" width="236" height="64" rx="10"/>
  <text class="lbl" x="822" y="446">헤더 추론</text>
  <text class="sml" x="822" y="468">colspan · 행 헤더 계층</text>

  <rect class="green" x="806" y="498" width="236" height="64" rx="10"/>
  <text class="lbl" x="822" y="524">보정 · 복구 계층</text>
  <text class="sml" x="822" y="546">누락 선 복구 · 텍스트 재결합</text>

  <text class="sml" x="806" y="582">성격이 다른 4종 후보를 병렬 생성</text>

  <path fill="none" stroke="#2f3b45" stroke-width="2.2" d="M1042 296 H1070 M1042 374 H1070 M1042 452 H1070 M1042 530 H1070 M1070 296 V530"/>
  <circle cx="1070" cy="296" r="4" fill="#2f3b45"/><circle cx="1070" cy="374" r="4" fill="#2f3b45"/>
  <circle cx="1070" cy="452" r="4" fill="#2f3b45"/><circle cx="1070" cy="530" r="4" fill="#2f3b45"/>
  <path class="thin" d="M1070 413 H1092"/>

  <rect class="amber" x="1096" y="348" width="166" height="130" rx="14"/>
  <text class="hdr2" x="1114" y="382">비교 · 선택</text>
  <text class="sml" x="1114" y="408">구조 안정성 평가</text>
  <text class="sml" x="1114" y="428">선택 근거 진단 기록</text>
  <text class="sml" x="1114" y="448">케이스 단위 추적</text>

  <text class="sml" x="786" y="668">보정 규칙의 구체 조건 · 판정 로직은</text>
  <text class="sml" x="786" y="690">특허 출원 범위 — 개념 수준만 표기</text>

  <path class="flow" d="M1288 460 H1322"/>

  <!-- ===================== 3) QUALITY & DELIVERY ===================== -->
  <text class="step" x="1350" y="136">3)</text>
  <text class="hdr" x="1382" y="136">Quality &amp; Delivery</text>
  <rect class="grpB" x="1332" y="150" width="626" height="620" rx="20"/>

  <rect class="grpK" x="1356" y="196" width="578" height="260" rx="18"/>
  <text class="hdr2" x="1376" y="230">TEDS Benchmark Console</text>

  <rect class="green" x="1376" y="256" width="170" height="72" rx="12"/>
  <text class="lbl" x="1394" y="284">TEDS</text>
  <text class="hdr2" x="1394" y="314">0.9188</text>
  <rect class="green" x="1560" y="256" width="170" height="72" rx="12"/>
  <text class="lbl" x="1578" y="284">TEDS-S</text>
  <text class="hdr2" x="1578" y="314">0.9506</text>
  <rect class="green" x="1744" y="256" width="170" height="72" rx="12"/>
  <text class="lbl" x="1762" y="284">Cell F1</text>
  <text class="hdr2" x="1762" y="314">0.9702</text>
  <text class="sml" x="1376" y="352">hf_finance_legal_mrc 480샘플 최신 실행</text>

  <rect class="peach" x="1376" y="366" width="265" height="56" rx="10"/>
  <text class="lbl" x="1392" y="390">fixed threshold baseline</text>
  <text class="sml" x="1392" y="410">TEDS 0.7540</text>
  <rect class="peach" x="1656" y="366" width="258" height="56" rx="10"/>
  <text class="lbl" x="1672" y="390">kmeans baseline</text>
  <text class="sml" x="1672" y="410">TEDS 0.3304</text>
  <text class="sml" x="1376" y="444">CI95 · pairwise · ablation · 회귀 세트 관리</text>

  <rect class="grpK" x="1356" y="486" width="578" height="250" rx="18"/>
  <text class="hdr2" x="1376" y="520">Secure Delivery</text>
  <g transform="translate(1548,502)">
    <rect x="0" y="8" width="20" height="14" rx="3" fill="#fdf3dd" stroke="#2f3b45" stroke-width="1.8"/>
    <path d="M4 8 V4 A6 6 0 0 1 16 4 V8" fill="none" stroke="#2f3b45" stroke-width="1.8"/>
  </g>

  <rect class="blue" x="1376" y="544" width="280" height="76" rx="12"/>
  <text class="lbl" x="1394" y="572">RSA-OAEP + AES-256-GCM</text>
  <text class="sml" x="1394" y="596">모델 · 설정 암호화 번들 · 원본 삭제</text>
  <rect class="purp" x="1672" y="544" width="242" height="76" rx="12"/>
  <text class="lbl" x="1690" y="572">Cython Compile</text>
  <text class="sml" x="1690" y="596">핵심 로직 바이너리화</text>

  <rect class="green" x="1376" y="640" width="538" height="70" rx="12"/>
  <text class="lbl" x="1394" y="668">실행 프로필 분리</text>
  <text class="sml" x="1394" y="692">개발 · 연구 · 고객 납품 · 모니터링 — 노출 기능을 빌드 단계에서 차단</text>

  <!-- ===================== caption ===================== -->
  <line x1="42" y1="800" x2="1958" y2="800" stroke="#333c44" stroke-width="2" stroke-dasharray="12 8"/>
  <text class="sub" x="42" y="836">Figure. InVision OCR 전체 아키텍처 — 문서는 레이아웃 분석·OCR·재조립을 거치고, 표 영역은 후보 생성→비교→선택 프레임으로 구조 복원되며, TEDS 벤치마크 콘솔로 품질을 증명한 뒤 암호화 번들로 납품된다.</text>
  <text class="sub" x="42" y="862">관련 기술 특허 출원 중 · K사 공급 계약 수주 — Deep-dive 별도 도판: ① 후보 생성·비교·선택 상세 ② TEDS 벤치마크 &amp; 회귀 게이트</text>
</svg>
