<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="700" viewBox="0 0 1700 700" role="img" aria-labelledby="t3 d3">
  <title id="t3">Deep dive: session-based deletion pipeline</title>
  <desc id="d3">A single DELETE removes only metadata and leaves ghost entries in Milvus and Neo4j, polluting search results. The session-based pipeline issues per-store deletion tasks in parallel and tracks their status, surfacing partial failures.</desc>
  <defs>
    <marker id="sage3" viewBox="0 0 12 12" refX="8" refY="6" markerWidth="4.5" markerHeight="4.5" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 z" fill="#b7cfb2"/>
    </marker>
    <marker id="dark3" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 z" fill="#2f3b45"/>
    </marker>
    <style>
      .hdr  { font: italic 700 26px Georgia, "Times New Roman", serif; fill: #17222b; }
      .hdr2 { font: 700 19px Georgia, "Times New Roman", serif; fill: #17222b; }
      .sub  { font: italic 500 15px Georgia, serif; fill: #5c6a75; }
      .lbl  { font: 600 14px -apple-system, "Segoe UI", sans-serif; fill: #2f3b45; }
      .sml  { font: 500 12.5px -apple-system, "Segoe UI", sans-serif; fill: #5c6a75; }
      .step { font: 800 18px Georgia, serif; fill: #c2571a; }
      .qtxt { font: italic 600 16px Georgia, serif; fill: #7a3d12; }
      .grpB { fill: #fdfefe; stroke: #4a7fa5; stroke-width: 2.5; stroke-dasharray: 11 8; }
      .grpK { fill: none; stroke: #333c44; stroke-width: 2.5; stroke-dasharray: 9 7; }
      .grpO { fill: #fffcf8; stroke: #c2571a; stroke-width: 2.5; stroke-dasharray: 9 7; }
      .pill { fill: #ffffff; stroke: #333c44; stroke-width: 2; stroke-dasharray: 7 5; }
      .peach{ fill: #fdefe2; stroke: #d9b38c; stroke-width: 1.6; }
      .blue { fill: #e8f1fa; stroke: #a9c6e0; stroke-width: 1.6; }
      .purp { fill: #efe9f7; stroke: #c3aede; stroke-width: 1.6; }
      .green{ fill: #e6f2e8; stroke: #a9cdb1; stroke-width: 1.6; }
      .amber{ fill: #fdf3dd; stroke: #dfc084; stroke-width: 1.8; }
      .ghost{ stroke-dasharray: 6 5; opacity: .62; }
      .flow { fill: none; stroke: #c9dcc5; stroke-width: 15; stroke-linecap: round; marker-end: url(#sage3); }
      .thin { fill: none; stroke: #2f3b45; stroke-width: 2.2; marker-end: url(#dark3); }
      .ink  { stroke: #2f3b45; stroke-width: 1.8; fill: #fff; }
    </style>
  </defs>
  <rect width="1700" height="700" fill="#ffffff"/>

  <text class="step" x="46" y="52">Deep Dive ②</text>
  <text class="hdr" x="172" y="52">세션 기반 삭제 파이프라인 — 삭제도 ingestion처럼 비동기로</text>
  <text class="sub" x="46" y="80">지식 하나가 여러 저장소(RDB · Milvus · Neo4j)에 흩어져 있어, 단일 DELETE는 유령 잔존물을 남긴다</text>

  <!-- ===================== BEFORE ===================== -->
  <rect class="grpK" x="46" y="104" width="1170" height="160" rx="16"/>
  <text class="hdr2" x="66" y="136">BEFORE — 단일 DELETE</text>

  <rect class="pill" x="66" y="170" width="160" height="44" rx="22"/>
  <text class="lbl" x="94" y="197">DELETE 요청</text>
  <path class="thin" d="M230 192 H266"/>

  <rect class="blue" x="270" y="170" width="220" height="44" rx="10"/>
  <text class="lbl" x="288" y="197">RDB 메타데이터만 삭제</text>

  <!-- fan-out to ghost leftovers -->
  <path fill="none" stroke="#2f3b45" stroke-width="2.2" d="M490 192 H516 M516 164 V228"/>
  <circle cx="516" cy="192" r="4" fill="#2f3b45"/>
  <path class="thin" d="M516 164 H540"/>
  <path class="thin" d="M516 228 H540"/>

  <rect class="peach ghost" x="544" y="142" width="300" height="44" rx="10"/>
  <text class="lbl" x="560" y="160">Milvus 벡터 잔존</text>
  <text class="sml" x="560" y="179">chunk · entity · relationship 컬렉션</text>
  <rect class="purp ghost" x="544" y="206" width="300" height="44" rx="10"/>
  <text class="lbl" x="560" y="224">Neo4j 그래프 잔존</text>
  <text class="sml" x="560" y="243">노드 · 관계</text>

  <!-- fan-in to pollution -->
  <path fill="none" stroke="#2f3b45" stroke-width="2.2" d="M844 164 H872 M844 228 H872 M872 164 V228"/>
  <circle cx="872" cy="196" r="4" fill="#2f3b45"/>
  <path class="thin" d="M872 196 H904"/>

  <rect class="grpO" x="908" y="160" width="290" height="72" rx="14"/>
  <text class="qtxt" x="928" y="188">“삭제한 지식이 검색 결과에</text>
  <text class="qtxt" x="928" y="212">여전히 인용된다”</text>

  <!-- promotion arrow -->
  <path class="flow" d="M630 272 V306"/>
  <text class="sub" x="662" y="296">삭제를 ingestion과 같은 비동기 파이프라인으로 승격</text>

  <!-- ===================== AFTER ===================== -->
  <rect class="grpB" x="46" y="316" width="1170" height="294" rx="20"/>
  <text class="hdr2" x="66" y="348">AFTER — 삭제 세션 파이프라인</text>
  <text class="sub" x="66" y="372">비동기 태스크 발행 · 저장소별 정리 · 상태 추적</text>

  <rect class="pill" x="66" y="452" width="150" height="44" rx="22"/>
  <text class="lbl" x="98" y="479">삭제 요청</text>
  <path class="thin" d="M220 474 H252"/>

  <rect class="pill" x="256" y="452" width="210" height="44" rx="22"/>
  <text class="lbl" x="274" y="479">Deletion Session 생성</text>

  <!-- fan-out bus -->
  <path fill="none" stroke="#2f3b45" stroke-width="2.2" d="M470 474 H492 M492 408 V540"/>
  <circle cx="492" cy="474" r="4" fill="#2f3b45"/>
  <path class="thin" d="M492 408 H516"/>
  <path class="thin" d="M492 474 H516"/>
  <path class="thin" d="M492 540 H516"/>

  <rect class="peach" x="520" y="382" width="300" height="52" rx="10"/>
  <text class="lbl" x="536" y="404">Milvus 삭제 태스크</text>
  <text class="sml" x="536" y="423">chunk · entity · relationship 컬렉션</text>
  <rect class="blue" x="520" y="448" width="300" height="52" rx="10"/>
  <text class="lbl" x="536" y="470">Neo4j 삭제 태스크</text>
  <text class="sml" x="536" y="489">그래프 노드 · 관계</text>
  <rect class="green" x="520" y="514" width="300" height="52" rx="10"/>
  <text class="lbl" x="536" y="536">RDB 삭제 태스크</text>
  <text class="sml" x="536" y="555">메타데이터 · 세션 레코드</text>

  <!-- fan-in bus -->
  <path fill="none" stroke="#2f3b45" stroke-width="2.2" d="M824 408 H848 M824 474 H848 M824 540 H848 M848 408 V540"/>
  <circle cx="848" cy="474" r="4" fill="#2f3b45"/>
  <path class="thin" d="M848 474 H880"/>

  <rect class="amber" x="884" y="414" width="310" height="120" rx="14"/>
  <text class="hdr2" x="904" y="446">Session Status Tracking</text>
  <text class="sml" x="904" y="472">저장소별 삭제 상태 추적</text>
  <text class="sml" x="904" y="492">부분 실패 가시화 — 남은 저장소 노출</text>
  <text class="sml" x="904" y="512">실패 태스크만 재시도</text>

  <!-- ===================== AUX: asyncio.Lock double-check ===================== -->
  <rect class="grpK" x="1250" y="104" width="404" height="506" rx="16"/>
  <text class="hdr2" x="1272" y="136">보조 — 연결 초기화 경합</text>
  <text class="sub" x="1272" y="160">asyncio.Lock + double-check 싱글톤</text>

  <rect class="pill" x="1282" y="192" width="340" height="44" rx="22"/>
  <text class="lbl" x="1302" y="219">동시 요청 N개 — 연결 초기화 시도</text>
  <path class="thin" d="M1452 236 V264"/>

  <rect class="green" x="1282" y="268" width="340" height="44" rx="10"/>
  <text class="lbl" x="1302" y="295">asyncio.Lock 획득</text>
  <path class="thin" d="M1452 312 V340"/>

  <rect class="amber" x="1282" y="344" width="340" height="56" rx="10"/>
  <text class="lbl" x="1302" y="366">연결 여부 재확인 (double-check)</text>
  <text class="sml" x="1302" y="386">이미 연결됨 → 즉시 반환</text>
  <path class="thin" d="M1452 400 V428"/>

  <rect class="blue" x="1282" y="432" width="340" height="44" rx="10"/>
  <text class="lbl" x="1302" y="459">미연결일 때만 단 1회 연결</text>

  <text class="sml" x="1282" y="512">연결 URI 폴백 체인 — 배포 환경별 기동 실패 방지</text>
  <rect class="purp" x="1282" y="524" width="102" height="36" rx="8"/>
  <text class="sml" x="1294" y="547">외부 인스턴스</text>
  <path class="thin" d="M1386 542 H1404"/>
  <rect class="purp" x="1408" y="524" width="118" height="36" rx="8"/>
  <text class="sml" x="1417" y="547">Docker 네트워크</text>
  <path class="thin" d="M1528 542 H1546"/>
  <rect class="purp" x="1550" y="524" width="86" height="36" rx="8"/>
  <text class="sml" x="1564" y="547">localhost</text>

  <!-- ===================== caption ===================== -->
  <line x1="46" y1="644" x2="1660" y2="644" stroke="#333c44" stroke-width="2" stroke-dasharray="12 8"/>
  <text class="sub" x="46" y="674">Figure. 세션 기반 삭제 파이프라인 — 단일 DELETE(상)는 메타데이터만 지워 벡터·그래프에 유령 잔존물을 남기고, 삭제 세션(하)은 저장소별 삭제 태스크를 병렬 발행해 상태를 추적하고 부분 실패를 드러낸다.</text>
</svg>
