<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="900" viewBox="0 0 2000 900" role="img" aria-labelledby="t d">
  <title id="t">A-VLAN overall architecture — paper figure style</title>
  <desc id="d">Compressed aviation ground CCTV video is anchored from wall-clock time to frame indices, a goal-driven orchestrator selects and refines skill compositions from a catalog, and judgements flow through safety-event rules and dual RAG into a briefing report with real timestamps.</desc>
  <defs>
    <marker id="sage" viewBox="0 0 12 12" refX="8" refY="6" markerWidth="4.5" markerHeight="4.5" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 z" fill="#b7cfb2"/>
    </marker>
    <marker id="dark" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 z" fill="#2f3b45"/>
    </marker>
    <style>
      .hdr  { font: italic 700 27px Georgia, "Times New Roman", serif; fill: #17222b; }
      .hdr2 { font: 700 20px Georgia, "Times New Roman", serif; fill: #17222b; }
      .sub  { font: italic 500 15px Georgia, serif; fill: #5c6a75; }
      .lbl  { font: 600 14.5px -apple-system, "Segoe UI", sans-serif; fill: #2f3b45; }
      .sml  { font: 500 12.5px -apple-system, "Segoe UI", sans-serif; fill: #5c6a75; }
      .step { font: 800 19px Georgia, serif; fill: #c2571a; }
      .qtxt { font: italic 600 16px Georgia, serif; fill: #7a3d12; }
      .grpB { fill: #fdfefe; stroke: #4a7fa5; stroke-width: 2.5; stroke-dasharray: 11 8; }
      .grpK { fill: none; stroke: #333c44; stroke-width: 2.5; stroke-dasharray: 9 7; }
      .grpO { fill: #fffcf8; stroke: #c2571a; stroke-width: 2.5; stroke-dasharray: 9 7; }
      .pill { fill: #ffffff; stroke: #333c44; stroke-width: 2; stroke-dasharray: 7 5; }
      .peach{ fill: #fdefe2; stroke: #d9b38c; stroke-width: 1.6; }
      .blue { fill: #e8f1fa; stroke: #a9c6e0; stroke-width: 1.6; }
      .purp { fill: #efe9f7; stroke: #c3aede; stroke-width: 1.6; }
      .green{ fill: #e6f2e8; stroke: #a9cdb1; stroke-width: 1.6; }
      .amber{ fill: #fdf3dd; stroke: #dfc084; stroke-width: 1.8; }
      .flow { fill: none; stroke: #c9dcc5; stroke-width: 15; stroke-linecap: round; marker-end: url(#sage); }
      .thin { fill: none; stroke: #2f3b45; stroke-width: 2.2; marker-end: url(#dark); }
      .ink  { stroke: #2f3b45; stroke-width: 1.8; fill: #fff; }
    </style>
  </defs>
  <rect width="2000" height="900" fill="#ffffff"/>

  <!-- ===================== INPUT: CCTV VIDEO ===================== -->
  <rect class="grpK" x="42" y="150" width="200" height="620" rx="18"/>
  <text class="hdr2" x="56" y="136">Input · CCTV 영상</text>
  <!-- video frame icon -->
  <g transform="translate(80,196)">
    <rect class="ink" x="0" y="0" width="84" height="60" rx="6"/>
    <path d="M32 15 L60 30 L32 45 Z" fill="#8a97a1"/>
    <text class="lbl" x="-6" y="88">항공 조업 영상</text>
  </g>
  <!-- clock icon -->
  <g transform="translate(96,330)">
    <circle class="ink" cx="26" cy="26" r="26"/>
    <line x1="26" y1="26" x2="26" y2="10" stroke="#2f3b45" stroke-width="3" stroke-linecap="round"/>
    <line x1="26" y1="26" x2="38" y2="31" stroke="#2f3b45" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text class="sml" x="66" y="404">촬영 시각 벽시계 기준</text>
  <!-- filename chip -->
  <rect class="peach" x="58" y="444" width="168" height="64" rx="10"/>
  <text class="sml" x="72" y="470">20250716_105946</text>
  <text class="sml" x="72" y="492">_x50 → ×50 압축</text>
  <text class="sml" x="58" y="544">파일명에 촬영 시각·</text>
  <text class="sml" x="58" y="566">압축 배율 인코딩</text>
  <rect class="blue" x="58" y="604" width="168" height="42" rx="10"/>
  <text class="lbl" x="76" y="630">50× 타임랩스</text>
  <path class="flow" d="M248 460 H282"/>

  <!-- ===================== 1) VIDEO ANCHORING ===================== -->
  <text class="step" x="300" y="136">1)</text>
  <text class="hdr" x="332" y="136">Video Anchoring</text>
  <rect class="grpB" x="292" y="150" width="370" height="620" rx="20"/>
  <text class="sub" x="316" y="184">벽시계 시각 → 프레임 결정적 매핑</text>

  <rect class="pill" x="316" y="214" width="290" height="52" rx="26"/>
  <g transform="translate(334,232)"><path d="M11 0 L13 8 L21 10 L13 12 L11 20 L9 12 L1 10 L9 8 Z" fill="#c2571a"/></g>
  <text class="lbl" x="364" y="238">파일명 디코드</text>
  <text class="sml" x="364" y="256">시작 시각 + 압축 배율</text>
  <path class="thin" d="M461 266 V300"/>

  <rect class="blue" x="316" y="304" width="290" height="76" rx="12"/>
  <text class="lbl" x="334" y="332">벽시계 시각 → 프레임 매핑</text>
  <text class="sml" x="334" y="356">경과시간 ÷ 배율 × fps = idx</text>
  <path class="thin" d="M461 380 V414"/>

  <rect class="green" x="316" y="418" width="290" height="76" rx="12"/>
  <text class="lbl" x="334" y="446">앵커 프레임 ± span</text>
  <text class="sml" x="334" y="470">구간 미지정 시 전후 N프레임</text>
  <path class="thin" d="M461 494 V528"/>

  <rect class="pill" x="316" y="532" width="290" height="58" rx="29"/>
  <g transform="translate(334,552)"><path d="M11 0 L13 8 L21 10 L13 12 L11 20 L9 12 L1 10 L9 8 Z" fill="#4a7fa5"/></g>
  <text class="lbl" x="364" y="556">VLM Scene Brief</text>
  <text class="sml" x="364" y="576">앵커 스틸 + 탐지 요약</text>
  <path class="thin" d="M461 590 V624"/>

  <rect class="peach" x="316" y="628" width="290" height="70" rx="12"/>
  <text class="lbl" x="334" y="656">세션 상황 브리프</text>
  <text class="sml" x="334" y="680">모든 스킬이 공유하는 상황 인식</text>

  <path class="flow" d="M668 460 H702"/>

  <!-- ===================== 2) GOAL-DRIVEN ORCHESTRATION ===================== -->
  <text class="step" x="720" y="136">2)</text>
  <text class="hdr" x="752" y="136">Goal-driven Orchestration</text>
  <rect class="grpB" x="712" y="150" width="650" height="620" rx="20"/>

  <!-- goal bubble -->
  <rect class="grpO" x="736" y="180" width="396" height="70" rx="16"/>
  <text class="qtxt" x="756" y="208">“이 목표(안전 점검 항목)가</text>
  <text class="qtxt" x="756" y="232">충족됐는가?” — Goal 입력</text>
  <g transform="translate(1156,192)"><circle cx="18" cy="18" r="13" fill="none" stroke="#2f3b45" stroke-width="3"/><line x1="28" y1="28" x2="42" y2="42" stroke="#2f3b45" stroke-width="4" stroke-linecap="round"/></g>
  <text class="hdr2" x="1220" y="220">Goal</text>

  <!-- skill catalog -->
  <rect class="grpK" x="736" y="280" width="270" height="440" rx="18"/>
  <text class="hdr2" x="756" y="312">Skill Catalog</text>
  <text class="sml" x="756" y="334">전역 ∪ 사용자 커스텀</text>
  <rect class="peach" x="756" y="352" width="200" height="40" rx="9"/><text class="lbl" x="776" y="377">탐지</text>
  <rect class="blue"  x="756" y="400" width="200" height="40" rx="9"/><text class="lbl" x="776" y="425">행동분석</text>
  <rect class="purp"  x="756" y="448" width="200" height="40" rx="9"/><text class="lbl" x="776" y="473">준수판정</text>
  <rect class="green" x="756" y="496" width="200" height="40" rx="9"/><text class="lbl" x="776" y="521">브리핑</text>
  <rect class="amber" x="756" y="544" width="200" height="40" rx="9"/><text class="lbl" x="776" y="569">커스텀 스킬</text>
  <text class="sml" x="756" y="620">SkillDescriptor 1:N 전개</text>
  <text class="sml" x="756" y="642">그래프 무결성(drift) 검사</text>

  <!-- orchestration loop -->
  <text class="hdr2" x="1046" y="312">GoalOrchestrator 루프</text>
  <rect class="blue"  x="1046" y="330" width="130" height="52" rx="10"/>
  <text class="lbl" x="1072" y="352">select</text><text class="sml" x="1072" y="372">조합 선택</text>
  <rect class="green" x="1206" y="330" width="130" height="52" rx="10"/>
  <text class="lbl" x="1226" y="352">compose</text><text class="sml" x="1226" y="372">순서 조립</text>
  <rect class="amber" x="1206" y="470" width="130" height="52" rx="10"/>
  <text class="lbl" x="1226" y="492">evaluate</text><text class="sml" x="1226" y="512">목표 평가</text>
  <rect class="purp"  x="1046" y="470" width="130" height="52" rx="10"/>
  <text class="lbl" x="1076" y="492">refine</text><text class="sml" x="1076" y="512">조정 생성</text>
  <path class="thin" d="M1180 356 H1202"/>
  <path class="thin" d="M1271 386 V466"/>
  <path class="thin" d="M1202 496 H1180"/>
  <path class="thin" d="M1111 466 V386"/>

  <path class="thin" d="M1010 356 H1042"/>
  <path class="thin" d="M1111 254 V326"/>

  <!-- dual termination -->
  <path class="thin" d="M1271 526 V566"/>
  <rect class="grpK" x="1046" y="570" width="290" height="88" rx="14"/>
  <text class="lbl" x="1066" y="600">이중 종료</text>
  <text class="sml" x="1066" y="624">만족 판정(커버리지 기반) or</text>
  <text class="sml" x="1066" y="644">max_iterations 도달</text>
  <text class="sml" x="1046" y="694">refine — 허용 목록 내 조정만</text>
  <text class="sml" x="1046" y="716">3레버: 객관지표·단일화·세분화</text>

  <path class="flow" d="M1368 460 H1402"/>

  <!-- ===================== 3) JUDGEMENT & OUTPUT ===================== -->
  <text class="step" x="1420" y="136">3)</text>
  <text class="hdr" x="1452" y="136">Judgement &amp; Output</text>
  <rect class="grpB" x="1412" y="150" width="546" height="620" rx="20"/>
  <text class="sub" x="1436" y="184">규칙 판정 · 법령 근거 · 리포트</text>

  <rect class="amber" x="1436" y="210" width="280" height="110" rx="14"/>
  <text class="hdr2" x="1456" y="242">safety_events 규칙</text>
  <text class="sml" x="1456" y="268">거리 정규화 — 실제 해상도 기준</text>
  <text class="sml" x="1456" y="290">interval 룰 · line-cross 룰</text>

  <rect class="purp" x="1436" y="360" width="280" height="110" rx="14"/>
  <text class="hdr2" x="1456" y="392">항공법령 듀얼 RAG</text>
  <text class="sml" x="1456" y="418">정확 문자열 매칭 + 벡터 검색</text>
  <text class="sml" x="1456" y="440">조문 번호는 정확 매칭 우선</text>

  <!-- bus join into report -->
  <path fill="none" stroke="#2f3b45" stroke-width="2.2" d="M1720 265 H1780 V415 M1720 415 H1780"/>
  <circle cx="1780" cy="265" r="4" fill="#2f3b45"/>
  <circle cx="1780" cy="415" r="4" fill="#2f3b45"/>
  <path class="thin" d="M1780 415 V556"/>

  <rect class="grpO" x="1436" y="560" width="460" height="150" rx="16"/>
  <text class="hdr2" x="1460" y="594">브리핑 리포트</text>
  <text class="qtxt" x="1460" y="626">“10시 59분 46초 — 재생 00:12”</text>
  <text class="sml" x="1460" y="656">실제 시각 + 압축 재생 위치 병기</text>
  <text class="sml" x="1460" y="678">운영자·검증자 모두의 언어로</text>
  <g transform="translate(1812,584)">
    <path class="ink" d="M0 0 H46 L62 16 V72 H0 Z"/><path class="ink" d="M46 0 V16 H62" fill="none"/>
    <line x1="11" y1="32" x2="51" y2="32" stroke="#8a97a1" stroke-width="3"/>
    <line x1="11" y1="46" x2="51" y2="46" stroke="#8a97a1" stroke-width="3"/>
    <line x1="11" y1="60" x2="38" y2="60" stroke="#8a97a1" stroke-width="3"/>
  </g>

  <!-- ===================== caption ===================== -->
  <line x1="42" y1="800" x2="1958" y2="800" stroke="#333c44" stroke-width="2" stroke-dasharray="12 8"/>
  <text class="sub" x="42" y="836">Figure. A-VLAN 전체 아키텍처 — 압축 CCTV 영상은 파일명 기반 시각 앵커링으로 프레임에 매핑되고, GoalOrchestrator가 스킬 카탈로그에서 select→compose→evaluate→refine 루프로 조합을 관제하며, safety_events 규칙·항공법령 듀얼 RAG를 거쳐 실제 시각이 병기된 브리핑 리포트가 출력된다.</text>
  <text class="sub" x="42" y="862">전신 버전 ‘AI 항공조업 안전기술’은 기업혁신대상 대한상공회의소 회장상(’25) 수상. Deep-dive 별도 도판: ② GoalOrchestrator 이중 종료 ③ 벽시계 시각↔프레임 앵커링</text>
</svg>
