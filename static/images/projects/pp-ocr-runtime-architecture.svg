<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">InVision OCR runtime architecture</title>
  <desc id="desc">Runtime architecture showing the product screen, request layer, feature profile, OCR engines, document recovery, storage, monitoring, and delivery profiles.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 Z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #eef2ff; stroke: #c7d2fe; }
      .node rect { stroke-width: 2; rx: 16; }
      .node text { fill: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: 700; }
      .node .sub { fill: #475569; font-size: 14px; font-weight: 600; }
      .edge { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrow); stroke-dasharray: 8 8; }
      .label { fill: #475569; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; font-weight: 700; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1280" height="720" rx="28" />
  <rect class="lane" x="36" y="34" width="1208" height="116" rx="22" opacity="0.7" />
  <text x="60" y="76" class="label">Product Runtime Boundary</text>

  <g class="node" transform="translate(60 86)">
    <rect width="210" height="106" fill="#e0f2fe" stroke="#38bdf8" />
    <text x="24" y="34"><tspan x="24" dy="0">Product UI</tspan><tspan class="sub" x="24" dy="26">upload / review</tspan><tspan class="sub" x="24" dy="22">research / admin</tspan></text>
  </g>
  <g class="node" transform="translate(374 86)">
    <rect width="220" height="106" fill="#dcfce7" stroke="#22c55e" />
    <text x="24" y="34"><tspan x="24" dy="0">Request Layer</tspan><tspan class="sub" x="24" dy="26">auth / history</tspan><tspan class="sub" x="24" dy="22">validated input</tspan></text>
  </g>
  <g class="node" transform="translate(698 86)">
    <rect width="232" height="106" fill="#fef3c7" stroke="#f59e0b" />
    <text x="24" y="34"><tspan x="24" dy="0">Feature Profile</tspan><tspan class="sub" x="24" dy="26">mode selection</tspan><tspan class="sub" x="24" dy="22">enabled features</tspan></text>
  </g>
  <g class="node" transform="translate(1038 86)">
    <rect width="182" height="106" fill="#fae8ff" stroke="#d946ef" />
    <text x="22" y="34"><tspan x="22" dy="0">Auth / History</tspan><tspan class="sub" x="22" dy="26">roles</tspan><tspan class="sub" x="22" dy="22">saved results</tspan></text>
  </g>

  <path class="edge" d="M270 139 H374" />
  <path class="edge" d="M594 139 H698" />
  <path class="edge" d="M930 139 H1038" />

  <g class="node" transform="translate(70 294)">
    <rect width="224" height="118" fill="#eff6ff" stroke="#3b82f6" />
    <text x="24" y="38"><tspan x="24" dy="0">OCR Engine</tspan><tspan class="sub" x="24" dy="27">InVision OCR</tspan><tspan class="sub" x="24" dy="22">custom serving</tspan></text>
  </g>
  <g class="node" transform="translate(372 294)">
    <rect width="224" height="118" fill="#ecfdf5" stroke="#10b981" />
    <text x="24" y="38"><tspan x="24" dy="0">Layout Analysis</tspan><tspan class="sub" x="24" dy="27">document areas</tspan><tspan class="sub" x="24" dy="22">reading order</tspan></text>
  </g>
  <g class="node" transform="translate(674 294)">
    <rect width="224" height="118" fill="#fff7ed" stroke="#fb923c" />
    <text x="24" y="38"><tspan x="24" dy="0">Document Recovery</tspan><tspan class="sub" x="24" dy="27">PDF pages</tspan><tspan class="sub" x="24" dy="22">digital text</tspan></text>
  </g>
  <g class="node" transform="translate(976 294)">
    <rect width="224" height="118" fill="#fdf2f8" stroke="#ec4899" />
    <text x="24" y="38"><tspan x="24" dy="0">Table Recovery</tspan><tspan class="sub" x="24" dy="27">structure candidates</tspan><tspan class="sub" x="24" dy="22">text / headers</tspan></text>
  </g>

  <path class="edge" d="M484 192 V248 H182 V294" />
  <path class="edge" d="M484 192 V294" />
  <path class="edge" d="M814 192 V248 H786 V294" />
  <path class="edge" d="M814 192 V248 H1088 V294" />
  <path class="edge-soft" d="M294 353 H372" />
  <path class="edge-soft" d="M596 353 H674" />
  <path class="edge-soft" d="M898 353 H976" />

  <g class="node" transform="translate(130 536)">
    <rect width="220" height="108" fill="#f1f5f9" stroke="#64748b" />
    <text x="24" y="36"><tspan x="24" dy="0">Model Assets</tspan><tspan class="sub" x="24" dy="26">engine bundle</tspan><tspan class="sub" x="24" dy="22">secure package</tspan></text>
  </g>
  <g class="node" transform="translate(410 536)">
    <rect width="220" height="108" fill="#f1f5f9" stroke="#64748b" />
    <text x="24" y="36"><tspan x="24" dy="0">Result Storage</tspan><tspan class="sub" x="24" dy="26">history</tspan><tspan class="sub" x="24" dy="22">long jobs</tspan></text>
  </g>
  <g class="node" transform="translate(690 536)">
    <rect width="220" height="108" fill="#f1f5f9" stroke="#64748b" />
    <text x="24" y="36"><tspan x="24" dy="0">Observability</tspan><tspan class="sub" x="24" dy="26">Prometheus</tspan><tspan class="sub" x="24" dy="22">Grafana / logs</tspan></text>
  </g>
  <g class="node" transform="translate(970 536)">
    <rect width="220" height="108" fill="#f1f5f9" stroke="#64748b" />
    <text x="24" y="36"><tspan x="24" dy="0">Delivery Profiles</tspan><tspan class="sub" x="24" dy="26">unified / gpu</tspan><tspan class="sub" x="24" dy="22">research / customer</tspan></text>
  </g>

  <path class="edge-soft" d="M182 412 V536" />
  <path class="edge-soft" d="M484 412 V536" />
  <path class="edge-soft" d="M786 412 V536" />
  <path class="edge-soft" d="M1088 412 V536" />
</svg>
