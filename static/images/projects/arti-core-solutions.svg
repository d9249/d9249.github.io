<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">arti four core AI solutions</title>
  <desc id="desc">Four core AI solutions in arti: CATS, MERGE, CLEAR, and NEXIS.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .node rect { fill: #ffffff; stroke-width: 2.5; rx: 8; }
      .cats rect { stroke: #7c3aed; }
      .merge rect { stroke: #0f766e; }
      .clear rect { stroke: #d97706; }
      .nexis rect { stroke: #be123c; }
      .badge { font-size: 12px; font-weight: 900; fill: #ffffff; }
      .badge-circle { opacity: 0.95; }
      .title { font-size: 28px; font-weight: 800; fill: #0f172a; }
      .subtitle { font-size: 15px; font-weight: 700; fill: #475569; }
      .name { font-size: 21px; font-weight: 900; fill: #0f172a; }
      .label { font-size: 15px; font-weight: 800; fill: #334155; }
      .sub { font-size: 13px; font-weight: 650; fill: #475569; }
      .metric { font-size: 13px; font-weight: 850; fill: #047857; }
      text { font-family: Inter, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="680"/>
  <text class="title" x="54" y="58">arti 핵심 AI 솔루션</text>
  <text class="subtitle" x="54" y="86">CATS, MERGE, CLEAR, NEXIS 네 축으로 인공지능 기술 리드 수행</text>

  <g class="node cats" transform="translate(54 132)">
    <rect width="260" height="420"/>
    <circle class="badge-circle" cx="34" cy="38" r="16" fill="#7c3aed"/>
    <text class="badge" x="34" y="43" text-anchor="middle">CAT</text>
    <text class="name" x="64" y="44">
      <tspan x="64" dy="0">CATS</tspan>
    </text>
    <text class="label" x="28" y="84">
      <tspan x="28" dy="0">다중 에이전트</tspan>
      <tspan x="28" dy="22">콘텐츠 솔루션</tspan>
    </text>
    <text class="sub" x="28" y="138">
      <tspan x="28" dy="0">책 내용을 퀴즈, 음악,</tspan>
      <tspan x="28" dy="20">인터랙티브 스토리로</tspan>
      <tspan x="28" dy="20">자동 변환</tspan>
    </text>
    <text class="label" x="28" y="232">핵심 기술</text>
    <text class="sub" x="28" y="262">
      <tspan x="28" dy="0">LangGraph</tspan>
      <tspan x="28" dy="20">벡터 검색</tspan>
      <tspan x="28" dy="20">자동 콘텐츠 생성</tspan>
    </text>
    <text class="metric" x="28" y="350">
      <tspan x="28" dy="0">퀴즈 관련성 95%</tspan>
      <tspan x="28" dy="22">음악 매칭 90%</tspan>
    </text>
  </g>

  <g class="node merge" transform="translate(330 132)">
    <rect width="260" height="420"/>
    <circle class="badge-circle" cx="34" cy="38" r="16" fill="#0f766e"/>
    <text class="badge" x="34" y="43" text-anchor="middle">MER</text>
    <text class="name" x="64" y="44">
      <tspan x="64" dy="0">MERGE</tspan>
    </text>
    <text class="label" x="28" y="84">
      <tspan x="28" dy="0">프롬프트 기반</tspan>
      <tspan x="28" dy="22">탐지 솔루션</tspan>
    </text>
    <text class="sub" x="28" y="138">
      <tspan x="28" dy="0">자연어 요청으로</tspan>
      <tspan x="28" dy="20">이미지 속 객체를</tspan>
      <tspan x="28" dy="20">정밀하게 탐지</tspan>
    </text>
    <text class="label" x="28" y="232">핵심 기술</text>
    <text class="sub" x="28" y="262">
      <tspan x="28" dy="0">멀티모달 Transformer</tspan>
      <tspan x="28" dy="20">프롬프트 기반 탐지</tspan>
      <tspan x="28" dy="20">영역 분할 / 중복 제거</tspan>
    </text>
    <text class="metric" x="28" y="350">
      <tspan x="28" dy="0">bbox AP 56.7</tspan>
      <tspan x="28" dy="22">0.2초 처리</tspan>
    </text>
  </g>

  <g class="node clear" transform="translate(606 132)">
    <rect width="260" height="420"/>
    <circle class="badge-circle" cx="34" cy="38" r="16" fill="#d97706"/>
    <text class="badge" x="34" y="43" text-anchor="middle">CLR</text>
    <text class="name" x="64" y="44">
      <tspan x="64" dy="0">CLEAR</tspan>
    </text>
    <text class="label" x="28" y="84">
      <tspan x="28" dy="0">다국어 문서 인식</tspan>
      <tspan x="28" dy="22">및 교정</tspan>
    </text>
    <text class="sub" x="28" y="138">
      <tspan x="28" dy="0">90여 언어 문서를</tspan>
      <tspan x="28" dy="20">레이아웃 보존 상태로</tspan>
      <tspan x="28" dy="20">인식하고 교정</tspan>
    </text>
    <text class="label" x="28" y="232">핵심 기술</text>
    <text class="sub" x="28" y="262">
      <tspan x="28" dy="0">Vision Transformer</tspan>
      <tspan x="28" dy="20">OCR-free 인식</tspan>
      <tspan x="28" dy="20">NLP 교정</tspan>
    </text>
    <text class="metric" x="28" y="350">
      <tspan x="28" dy="0">99% 검출 정확도</tspan>
      <tspan x="28" dy="22">98.7% 교정 정확도</tspan>
    </text>
  </g>

  <g class="node nexis" transform="translate(882 132)">
    <rect width="260" height="420"/>
    <circle class="badge-circle" cx="34" cy="38" r="16" fill="#be123c"/>
    <text class="badge" x="34" y="43" text-anchor="middle">NEX</text>
    <text class="name" x="64" y="44">
      <tspan x="64" dy="0">NEXIS</tspan>
    </text>
    <text class="label" x="28" y="84">
      <tspan x="28" dy="0">문서기반 대화</tspan>
      <tspan x="28" dy="22">및 매칭 솔루션</tspan>
    </text>
    <text class="sub" x="28" y="138">
      <tspan x="28" dy="0">문서 질문에 답하고</tspan>
      <tspan x="28" dy="20">글 분위기에 맞는</tspan>
      <tspan x="28" dy="20">효과음을 추천</tspan>
    </text>
    <text class="label" x="28" y="232">핵심 기술</text>
    <text class="sub" x="28" y="262">
      <tspan x="28" dy="0">RAG / Qdrant</tspan>
      <tspan x="28" dy="20">BGE-M3</tspan>
      <tspan x="28" dy="20">Cross-modal matching</tspan>
    </text>
    <text class="metric" x="28" y="350">
      <tspan x="28" dy="0">50ms 검색</tspan>
      <tspan x="28" dy="22">할루시네이션 2% 이하</tspan>
    </text>
  </g>
</svg>
