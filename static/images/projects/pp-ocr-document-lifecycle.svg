<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">InVision OCR document lifecycle</title>
  <desc id="desc">Document lifecycle from upload and validation through OCR, layout analysis, document recovery, history, review, reprocess, benchmark, and delivery.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 Z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .node rect { stroke-width: 2; rx: 16; }
      .node text { fill: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: 700; }
      .node .sub { fill: #475569; font-size: 14px; font-weight: 600; }
      .edge { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrow); stroke-dasharray: 8 8; }
      .stage { fill: #475569; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 0.04em; }
    </style>
  </defs>
  <rect class="bg" width="1280" height="720" rx="28" />
  <text class="stage" x="68" y="62">DOCUMENT INTAKE</text>
  <text class="stage" x="484" y="62">STRUCTURE RECOVERY</text>
  <text class="stage" x="900" y="62">OPERATING LOOP</text>

  <g class="node" transform="translate(62 104)">
    <rect width="220" height="104" fill="#e0f2fe" stroke="#38bdf8" />
    <text x="24" y="35"><tspan x="24" dy="0">Upload</tspan><tspan class="sub" x="24" dy="26">image / PDF / ZIP</tspan><tspan class="sub" x="24" dy="21">review workspace</tspan></text>
  </g>
  <g class="node" transform="translate(62 302)">
    <rect width="220" height="104" fill="#e0f2fe" stroke="#38bdf8" />
    <text x="24" y="35"><tspan x="24" dy="0">Validate</tspan><tspan class="sub" x="24" dy="26">access / file size</tspan><tspan class="sub" x="24" dy="21">content checks</tspan></text>
  </g>
  <g class="node" transform="translate(62 500)">
    <rect width="220" height="104" fill="#e0f2fe" stroke="#38bdf8" />
    <text x="24" y="35"><tspan x="24" dy="0">Mode Select</tspan><tspan class="sub" x="24" dy="26">OCR / layout</tspan><tspan class="sub" x="24" dy="21">regions / batch</tspan></text>
  </g>

  <g class="node" transform="translate(428 104)">
    <rect width="230" height="104" fill="#dcfce7" stroke="#22c55e" />
    <text x="24" y="35"><tspan x="24" dy="0">OCR Processing</tspan><tspan class="sub" x="24" dy="26">InVision OCR</tspan><tspan class="sub" x="24" dy="21">custom serving</tspan></text>
  </g>
  <g class="node" transform="translate(428 302)">
    <rect width="230" height="104" fill="#fef3c7" stroke="#f59e0b" />
    <text x="24" y="35"><tspan x="24" dy="0">Layout Analysis</tspan><tspan class="sub" x="24" dy="26">regions / reading order</tspan><tspan class="sub" x="24" dy="21">page previews</tspan></text>
  </g>
  <g class="node" transform="translate(428 500)">
    <rect width="230" height="104" fill="#ffedd5" stroke="#fb923c" />
    <text x="24" y="35"><tspan x="24" dy="0">Document Recovery</tspan><tspan class="sub" x="24" dy="26">digital text mix</tspan><tspan class="sub" x="24" dy="21">assembled blocks</tspan></text>
  </g>

  <g class="node" transform="translate(792 104)">
    <rect width="230" height="104" fill="#fdf2f8" stroke="#ec4899" />
    <text x="24" y="35"><tspan x="24" dy="0">Table Recovery</tspan><tspan class="sub" x="24" dy="26">candidate selection</tspan><tspan class="sub" x="24" dy="21">markdown / html</tspan></text>
  </g>
  <g class="node" transform="translate(792 302)">
    <rect width="230" height="104" fill="#ede9fe" stroke="#8b5cf6" />
    <text x="24" y="35"><tspan x="24" dy="0">History Store</tspan><tspan class="sub" x="24" dy="26">saved results</tspan><tspan class="sub" x="24" dy="21">jobs / reprocess</tspan></text>
  </g>
  <g class="node" transform="translate(792 500)">
    <rect width="230" height="104" fill="#ecfeff" stroke="#06b6d4" />
    <text x="24" y="35"><tspan x="24" dy="0">Review Screen</tspan><tspan class="sub" x="24" dy="26">viewer / tables</tspan><tspan class="sub" x="24" dy="21">template report</tspan></text>
  </g>

  <g class="node" transform="translate(1074 203)">
    <rect width="160" height="104" fill="#f1f5f9" stroke="#64748b" />
    <text x="20" y="35"><tspan x="20" dy="0">Benchmark</tspan><tspan class="sub" x="20" dy="26">research</tspan><tspan class="sub" x="20" dy="21">comparison</tspan></text>
  </g>
  <g class="node" transform="translate(1074 401)">
    <rect width="160" height="104" fill="#f1f5f9" stroke="#64748b" />
    <text x="20" y="35"><tspan x="20" dy="0">Delivery</tspan><tspan class="sub" x="20" dy="26">unified image</tspan><tspan class="sub" x="20" dy="21">license guard</tspan></text>
  </g>

  <path class="edge" d="M282 156 H428" />
  <path class="edge" d="M282 354 H428" />
  <path class="edge" d="M282 552 H428" />
  <path class="edge" d="M658 156 H792" />
  <path class="edge" d="M658 354 H792" />
  <path class="edge" d="M658 552 H792" />
  <path class="edge" d="M902 208 V302" />
  <path class="edge" d="M902 406 V500" />
  <path class="edge-soft" d="M1022 354 H1090 V307" />
  <path class="edge-soft" d="M1022 552 H1090 V505" />
  <path class="edge-soft" d="M872 500 V456 H172 V406" />
</svg>
