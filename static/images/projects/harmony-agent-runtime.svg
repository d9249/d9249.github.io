<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Harmony Agent Runtime architecture</title>
  <desc id="desc">Web, Voice, Space surfaces enter FastAPI, restore UserContext, run Harmony Agent, call tools and retrieval, then persist citations, traces, sessions, and audit records.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="58%" stop-color="#f5fbf7"/>
      <stop offset="100%" stop-color="#fffaf2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#20323d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f5f72"/>
    </marker>
    <style>
      .title { font: 800 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f1720; }
      .sub { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526271; }
      .eyebrow { font: 800 13px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0; text-transform: uppercase; fill: #07966f; }
      .box-title { font: 800 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111820; }
      .box-text { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5b67; }
      .small { font: 700 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #5d6b76; }
      .panel { fill: #ffffff; stroke: #d9e2ea; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .soft { fill: #f8fbfd; stroke: #d9e2ea; stroke-width: 2; rx: 14; }
      .green { fill: #eaf8f0; stroke: #9fd8bc; stroke-width: 2; rx: 14; }
      .blue { fill: #eef6ff; stroke: #a9cbed; stroke-width: 2; rx: 14; }
      .amber { fill: #fff7e8; stroke: #e9c67f; stroke-width: 2; rx: 14; }
      .line { fill: none; stroke: #3f5f72; stroke-width: 3; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #91a3b0; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M0 170 H1600 M0 330 H1600 M0 490 H1600 M0 650 H1600 M0 810 H1600 M200 0 V900 M400 0 V900 M600 0 V900 M800 0 V900 M1000 0 V900 M1200 0 V900 M1400 0 V900" stroke="#dfe8ee" stroke-opacity="0.55" stroke-width="1"/>

  <text x="70" y="76" class="eyebrow">Runtime Contract</text>
  <text x="70" y="122" class="title">Harmony Agent는 한 번의 turn마다 사용자, 세션, 권한, 도구 흔적을 같이 들고 실행된다</text>
  <text x="70" y="156" class="sub">모델 응답이 아니라 추적 가능한 agent turn을 제품의 기본 단위로 둔 구조</text>

  <rect x="70" y="230" width="255" height="115" class="soft"/>
  <text x="96" y="270" class="box-title">Web App</text>
  <text x="96" y="304" class="box-text">Chat, Knowledge,</text>
  <text x="96" y="328" class="box-text">Personas, Admin UI</text>

  <rect x="70" y="385" width="255" height="115" class="soft"/>
  <text x="96" y="425" class="box-title">Space Chat</text>
  <text x="96" y="459" class="box-text">owner, member, guest</text>
  <text x="96" y="483" class="box-text">역할별 협업 경계</text>

  <rect x="70" y="540" width="255" height="115" class="soft"/>
  <text x="96" y="580" class="box-title">Voice Meeting</text>
  <text x="96" y="614" class="box-text">transcript, research,</text>
  <text x="96" y="638" class="box-text">post-meeting handoff</text>

  <rect x="405" y="305" width="250" height="245" class="panel"/>
  <text x="435" y="350" class="eyebrow">FastAPI Boundary</text>
  <text x="435" y="390" class="box-title">API Layer</text>
  <text x="435" y="428" class="box-text">JWT 또는 local auth에서</text>
  <text x="435" y="452" class="box-text">UserContext 복원</text>
  <text x="435" y="492" class="box-text">Session channel 판별</text>
  <text x="435" y="516" class="box-text">approval gate와 audit 연결</text>

  <rect x="735" y="230" width="430" height="425" class="panel"/>
  <text x="770" y="278" class="eyebrow">Core Execution</text>
  <text x="770" y="322" class="box-title">Harmony Agent Runtime</text>
  <text x="770" y="360" class="box-text">IAIAgent.run_turn / stream_turn 계약</text>

  <rect x="775" y="395" width="350" height="64" class="green"/>
  <text x="800" y="423" class="small">01 Persona Composer</text>
  <text x="800" y="447" class="box-text">team, rank, role, tenure, memory overlay</text>

  <rect x="775" y="475" width="350" height="64" class="blue"/>
  <text x="800" y="503" class="small">02 Tool Context</text>
  <text x="800" y="527" class="box-text">current user/session scope를 도구에 전파</text>

  <rect x="775" y="555" width="350" height="64" class="amber"/>
  <text x="800" y="583" class="small">03 Turn Result</text>
  <text x="800" y="607" class="box-text">text, citations, tool trace, usage, latency</text>

  <rect x="1245" y="205" width="285" height="86" class="green"/>
  <text x="1272" y="239" class="box-title">Knowledge Tool</text>
  <text x="1272" y="268" class="box-text">PageIndex + permission filter</text>

  <rect x="1245" y="325" width="285" height="86" class="blue"/>
  <text x="1272" y="359" class="box-title">Skills / MCP</text>
  <text x="1272" y="388" class="box-text">personal, team, shared skills</text>

  <rect x="1245" y="445" width="285" height="86" class="amber"/>
  <text x="1272" y="479" class="box-title">Approval / Audit</text>
  <text x="1272" y="508" class="box-text">high-risk action gate, 기록</text>

  <rect x="1245" y="565" width="285" height="86" class="soft"/>
  <text x="1272" y="599" class="box-title">Meeting Pipeline</text>
  <text x="1272" y="628" class="box-text">summary, tasks, minutes</text>

  <rect x="405" y="725" width="250" height="90" class="soft"/>
  <text x="435" y="760" class="box-title">Sessions DB</text>
  <text x="435" y="790" class="box-text">chat history, goal, state</text>

  <rect x="705" y="725" width="250" height="90" class="soft"/>
  <text x="735" y="760" class="box-title">Persona Runtime</text>
  <text x="735" y="790" class="box-text">memory, skills, uploads</text>

  <rect x="1005" y="725" width="250" height="90" class="soft"/>
  <text x="1035" y="760" class="box-title">PageIndex Store</text>
  <text x="1035" y="790" class="box-text">shared corpus + personal docs</text>

  <rect x="1305" y="725" width="225" height="90" class="soft"/>
  <text x="1335" y="760" class="box-title">Audit Store</text>
  <text x="1335" y="790" class="box-text">turn, tool, approval events</text>

  <path class="line" d="M325 287 C360 287 366 356 405 356"/>
  <path class="line" d="M325 443 C360 443 366 426 405 426"/>
  <path class="line" d="M325 598 C360 598 366 500 405 500"/>
  <path class="line" d="M655 428 C690 428 700 430 735 430"/>
  <path class="line" d="M1165 332 C1198 300 1210 248 1245 248"/>
  <path class="line" d="M1165 444 C1198 420 1210 368 1245 368"/>
  <path class="line" d="M1165 536 C1198 520 1210 488 1245 488"/>
  <path class="line" d="M1165 602 C1198 610 1210 608 1245 608"/>
  <path class="thin" d="M530 550 C530 620 530 660 530 725"/>
  <path class="thin" d="M920 655 C890 690 860 700 830 725"/>
  <path class="thin" d="M1050 655 C1075 690 1095 700 1130 725"/>
  <path class="thin" d="M1387 651 C1400 685 1405 700 1415 725"/>
</svg>
