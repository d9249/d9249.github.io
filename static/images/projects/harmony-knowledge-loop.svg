<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Harmony human-gated knowledge loop</title>
  <desc id="desc">Raw materials pass through compiler stages, review queue, human approval, corpus publishing, PageIndex reload, permission-aware retrieval, and feedback into the next knowledge cycle.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9fbff"/>
      <stop offset="54%" stop-color="#f8fff8"/>
      <stop offset="100%" stop-color="#fff8ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f2c35" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#456474"/>
    </marker>
    <style>
      .title { font: 800 35px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #101820; }
      .sub { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536573; }
      .eyebrow { font: 800 13px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0; text-transform: uppercase; fill: #058467; }
      .box-title { font: 800 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #121a22; }
      .box-text { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4c5e69; }
      .small { font: 800 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #5c6872; }
      .panel { fill: #ffffff; stroke: #d9e3ea; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .stage { fill: #f8fbfd; stroke: #d9e3ea; stroke-width: 2; rx: 16; }
      .green { fill: #e9f8ef; stroke: #98d7b7; stroke-width: 2; rx: 16; }
      .blue { fill: #eef6ff; stroke: #a5c9ee; stroke-width: 2; rx: 16; }
      .amber { fill: #fff7e7; stroke: #e8c173; stroke-width: 2; rx: 16; }
      .red { fill: #fff0ee; stroke: #e7aaa0; stroke-width: 2; rx: 16; }
      .line { fill: none; stroke: #456474; stroke-width: 3; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #91a4af; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M0 180 H1600 M0 360 H1600 M0 540 H1600 M0 720 H1600 M200 0 V900 M400 0 V900 M600 0 V900 M800 0 V900 M1000 0 V900 M1200 0 V900 M1400 0 V900" stroke="#dfe8ee" stroke-opacity="0.5" stroke-width="1"/>

  <text x="70" y="76" class="eyebrow">Human-Gated Knowledge</text>
  <text x="70" y="124" class="title">Harmony는 새 문서를 곧바로 RAG에 넣지 않고, 사람 승인 뒤에만 공식 지식으로 발행한다</text>
  <text x="70" y="158" class="sub">AI는 지식화 후보를 만들고, reviewer는 권한과 본문을 확정하며, agent는 승인된 지식만 근거로 쓴다</text>

  <rect x="70" y="246" width="250" height="112" class="stage"/>
  <text x="98" y="285" class="box-title">Raw Inputs</text>
  <text x="98" y="318" class="box-text">문서, 회의록, 사용자 제출,</text>
  <text x="98" y="342" class="box-text">운영자가 올린 자료</text>

  <rect x="390" y="210" width="375" height="360" class="panel"/>
  <text x="425" y="255" class="eyebrow">LLM-Wiki Compiler</text>
  <text x="425" y="295" class="box-title">지식 후보를 만드는 파이프라인</text>

  <rect x="430" y="330" width="295" height="52" class="blue"/>
  <text x="455" y="362" class="small">01 ingest · RawSource 정규화</text>
  <rect x="430" y="396" width="295" height="52" class="red"/>
  <text x="455" y="428" class="small">02 sanitize · PII / token / license 위험</text>
  <rect x="430" y="462" width="295" height="52" class="green"/>
  <text x="455" y="494" class="small">03 classify · team / tag / classification</text>

  <rect x="840" y="246" width="270" height="112" class="amber"/>
  <text x="870" y="285" class="box-title">Review Queue</text>
  <text x="870" y="318" class="box-text">PENDING article draft</text>
  <text x="870" y="342" class="box-text">사람이 preview 후 판단</text>

  <rect x="840" y="420" width="270" height="112" class="green"/>
  <text x="870" y="459" class="box-title">Approve / Publish</text>
  <text x="870" y="492" class="box-text">권한 metadata 확정</text>
  <text x="870" y="516" class="box-text">corpus write + reload</text>

  <rect x="1195" y="210" width="330" height="360" class="panel"/>
  <text x="1230" y="255" class="eyebrow">Retrieval Plane</text>
  <text x="1230" y="295" class="box-title">승인된 지식만 검색 대상</text>

  <rect x="1232" y="330" width="255" height="58" class="green"/>
  <text x="1258" y="365" class="small">PageIndex shared corpus</text>
  <rect x="1232" y="408" width="255" height="58" class="blue"/>
  <text x="1258" y="443" class="small">owner-only personal docs</text>
  <rect x="1232" y="486" width="255" height="58" class="amber"/>
  <text x="1258" y="521" class="small">Space / meeting artifacts</text>

  <rect x="155" y="690" width="330" height="96" class="stage"/>
  <text x="185" y="727" class="box-title">Rejected / Needs Edit</text>
  <text x="185" y="758" class="box-text">출처 정리, 민감정보 제거, 권한 수정 후 재제출</text>

  <rect x="625" y="690" width="350" height="96" class="stage"/>
  <text x="655" y="727" class="box-title">Audit Trail</text>
  <text x="655" y="758" class="box-text">upload, approve, publish, search, citation 이벤트 기록</text>

  <rect x="1115" y="690" width="345" height="96" class="stage"/>
  <text x="1145" y="727" class="box-title">Agent Feedback Loop</text>
  <text x="1145" y="758" class="box-text">검색 근거와 빈 구간이 다음 지식 보강 후보가 됨</text>

  <path class="line" d="M320 302 C350 302 360 302 390 302"/>
  <path class="line" d="M765 302 C795 302 810 302 840 302"/>
  <path class="line" d="M975 358 C975 382 975 396 975 420"/>
  <path class="line" d="M1110 476 C1145 476 1160 390 1195 390"/>
  <path class="thin" d="M975 532 C930 620 805 638 800 690"/>
  <path class="thin" d="M840 302 C760 620 385 620 320 690"/>
  <path class="thin" d="M1360 570 C1360 620 1325 650 1288 690"/>
  <path class="thin" d="M1288 690 C1170 650 1080 606 1010 532"/>
  <path class="thin" d="M320 690 C390 630 430 590 475 540"/>
</svg>
