<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="700" viewBox="0 0 1700 700" role="img" aria-labelledby="t4 d4">
  <title id="t4">Deep dive: Agent Builder execution path</title>
  <desc id="d4">A workflow designed on a Vue Flow canvas is serialized to a JSON spec, built into a LangGraph StateGraph, executed with a retrieval node whose search mode is a parameter, and streamed to the user via SSE. The node library holds 65 modules across 20 categories.</desc>
  <defs>
    <marker id="sage4" viewBox="0 0 12 12" refX="8" refY="6" markerWidth="4.5" markerHeight="4.5" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 z" fill="#b7cfb2"/>
    </marker>
    <marker id="dark4" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 z" fill="#2f3b45"/>
    </marker>
    <style>
      .hdr  { font: italic 700 26px Georgia, "Times New Roman", serif; fill: #17222b; }
      .hdr2 { font: 700 19px Georgia, "Times New Roman", serif; fill: #17222b; }
      .sub  { font: italic 500 15px Georgia, serif; fill: #5c6a75; }
      .lbl  { font: 600 14px -apple-system, "Segoe UI", sans-serif; fill: #2f3b45; }
      .sml  { font: 500 12.5px -apple-system, "Segoe UI", sans-serif; fill: #5c6a75; }
      .mono { font: 600 13px "SF Mono", Menlo, Consolas, monospace; fill: #2f3b45; }
      .step { font: 800 18px Georgia, serif; fill: #c2571a; }
      .grpB { fill: #fdfefe; stroke: #4a7fa5; stroke-width: 2.5; stroke-dasharray: 11 8; }
      .grpK { fill: none; stroke: #333c44; stroke-width: 2.5; stroke-dasharray: 9 7; }
      .grpO { fill: #fffcf8; stroke: #c2571a; stroke-width: 2.5; stroke-dasharray: 9 7; }
      .pill { fill: #ffffff; stroke: #333c44; stroke-width: 2; stroke-dasharray: 7 5; }
      .peach{ fill: #fdefe2; stroke: #d9b38c; stroke-width: 1.6; }
      .blue { fill: #e8f1fa; stroke: #a9c6e0; stroke-width: 1.6; }
      .purp { fill: #efe9f7; stroke: #c3aede; stroke-width: 1.6; }
      .green{ fill: #e6f2e8; stroke: #a9cdb1; stroke-width: 1.6; }
      .amber{ fill: #fdf3dd; stroke: #dfc084; stroke-width: 1.8; }
      .flow { fill: none; stroke: #c9dcc5; stroke-width: 15; stroke-linecap: round; marker-end: url(#sage4); }
      .thin { fill: none; stroke: #2f3b45; stroke-width: 2.2; marker-end: url(#dark4); }
      .ink  { stroke: #2f3b45; stroke-width: 1.8; fill: #fff; }
    </style>
  </defs>
  <rect width="1700" height="700" fill="#ffffff"/>

  <text class="step" x="46" y="52">Deep Dive ③</text>
  <text class="hdr" x="172" y="52">Agent Builder — 검색 전략을 화면에서 조립한다</text>
  <text class="sub" x="46" y="80">Vue Flow canvas의 workflow가 JSON spec으로 직렬화되고, LangGraph StateGraph로 빌드되어 실행 · SSE 스트리밍된다</text>

  <!-- ===================== 1) DESIGN ===================== -->
  <rect class="grpK" x="46" y="110" width="340" height="320" rx="16"/>
  <text class="step" x="66" y="142">1)</text>
  <text class="hdr2" x="92" y="142">Design</text>
  <text class="sub" x="66" y="164">Vue Flow canvas — 노드 드래그 · 연결</text>

  <rect class="blue" x="86" y="192" width="130" height="36" rx="8"/>
  <text class="lbl" x="122" y="215">input</text>
  <path class="thin" d="M151 228 V252"/>
  <rect class="peach" x="86" y="256" width="130" height="40" rx="8"/>
  <text class="lbl" x="112" y="281">retrieval</text>
  <path class="thin" d="M151 296 V320"/>
  <rect class="purp" x="86" y="324" width="130" height="36" rx="8"/>
  <text class="lbl" x="118" y="347">router</text>
  <path class="thin" d="M216 342 H230 V298 H242"/>
  <rect class="green" x="246" y="280" width="120" height="36" rx="8"/>
  <text class="lbl" x="270" y="303">generate</text>
  <!-- drag selection + cursor -->
  <rect x="238" y="272" width="136" height="52" rx="10" fill="none" stroke="#333c44" stroke-width="2" stroke-dasharray="7 5"/>
  <g transform="translate(342,318)">
    <path d="M0 0 L14 12 L8 13 L11 20 L8 22 L5 14 L0 18 Z" fill="#2f3b45"/>
  </g>
  <text class="sml" x="66" y="410">node palette에서 drag &amp; drop</text>

  <path class="flow" d="M392 270 H426"/>

  <!-- ===================== 2) SERIALIZE ===================== -->
  <rect class="grpK" x="436" y="110" width="250" height="320" rx="16"/>
  <text class="step" x="456" y="142">2)</text>
  <text class="hdr2" x="482" y="142">Serialize</text>
  <text class="sub" x="456" y="164">workflow → JSON spec</text>

  <rect class="ink" x="456" y="188" width="210" height="184" rx="8"/>
  <text class="mono" x="472" y="214">{</text>
  <text class="mono" x="484" y="238">"nodes": [</text>
  <text class="mono" x="496" y="262">{id, type,</text>
  <text class="mono" x="508" y="286">params: {…}}</text>
  <text class="mono" x="484" y="310">],</text>
  <text class="mono" x="484" y="334">"edges": […]</text>
  <text class="mono" x="472" y="358">}</text>
  <text class="sml" x="456" y="410">노드 · 엣지 · 파라미터 직렬화</text>

  <path class="flow" d="M690 270 H724"/>

  <!-- ===================== 3) BUILD ===================== -->
  <rect class="grpK" x="734" y="110" width="300" height="320" rx="16"/>
  <text class="step" x="754" y="142">3)</text>
  <text class="hdr2" x="780" y="142">Build</text>
  <text class="sub" x="754" y="164">spec → LangGraph StateGraph</text>

  <rect class="pill" x="754" y="186" width="150" height="30" rx="15"/>
  <text class="lbl" x="804" y="206">START</text>
  <path class="thin" d="M829 216 V236"/>
  <rect class="blue" x="754" y="240" width="150" height="36" rx="8"/>
  <text class="lbl" x="778" y="263">retrieve node</text>
  <path class="thin" d="M829 276 V292"/>
  <path d="M829 296 L879 326 L829 356 L779 326 Z" class="amber"/>
  <text class="lbl" x="810" y="331">cond</text>
  <path class="thin" d="M829 356 V372"/>
  <rect class="green" x="754" y="376" width="150" height="36" rx="8"/>
  <text class="lbl" x="776" y="399">generate node</text>
  <path class="thin" d="M883 326 H916"/>
  <rect class="pill" x="920" y="310" width="88" height="32" rx="16"/>
  <text class="lbl" x="944" y="331">END</text>

  <path class="flow" d="M1038 270 H1072"/>

  <!-- ===================== 4) RUN ===================== -->
  <rect class="grpK" x="1082" y="110" width="300" height="320" rx="16"/>
  <text class="step" x="1102" y="142">4)</text>
  <text class="hdr2" x="1128" y="142">Run</text>
  <text class="sub" x="1102" y="164">그래프 실행 · 컨텍스트 조합</text>

  <rect class="amber" x="1102" y="188" width="260" height="158" rx="12"/>
  <text class="lbl" x="1118" y="214">retrieval node params</text>
  <text class="sml" x="1118" y="238">search_mode ∈</text>
  <rect class="peach" x="1118" y="250" width="60" height="26" rx="13"/><text class="sml" x="1132" y="267">local</text>
  <rect class="blue"  x="1188" y="250" width="66" height="26" rx="13"/><text class="sml" x="1200" y="267">global</text>
  <rect class="purp"  x="1264" y="250" width="68" height="26" rx="13"/><text class="sml" x="1276" y="267">hybrid</text>
  <rect class="green" x="1118" y="286" width="62" height="26" rx="13"/><text class="sml" x="1131" y="303">naive</text>
  <rect class="peach" x="1190" y="286" width="50" height="26" rx="13"/><text class="sml" x="1204" y="303">mix</text>
  <text class="sml" x="1118" y="334">top_k · dataset · rerank 파라미터</text>

  <text class="sml" x="1102" y="378">Milvus · Neo4j · Elasticsearch</text>
  <text class="sml" x="1102" y="398">컨텍스트를 조합해 검색 수행</text>

  <path class="flow" d="M1386 270 H1420"/>

  <!-- ===================== 5) STREAM ===================== -->
  <rect class="grpO" x="1430" y="110" width="230" height="320" rx="16"/>
  <text class="step" x="1450" y="142">5)</text>
  <text class="hdr2" x="1476" y="142">Stream</text>
  <text class="sub" x="1450" y="164">SSE 토큰 스트리밍</text>

  <rect class="ink" x="1450" y="188" width="190" height="112" rx="8"/>
  <rect x="1464" y="204" width="160" height="10" rx="3" fill="#cfd8de"/>
  <rect x="1464" y="226" width="138" height="10" rx="3" fill="#cfd8de"/>
  <rect x="1464" y="248" width="150" height="10" rx="3" fill="#cfd8de"/>
  <rect x="1464" y="270" width="92" height="10" rx="3" fill="#cfd8de"/>
  <rect x="1562" y="268" width="10" height="14" fill="#c2571a"/>

  <g transform="translate(1450,326)">
    <rect x="0" y="10" width="34" height="24" rx="6" fill="#fff" stroke="#2f3b45" stroke-width="2"/>
    <circle cx="10" cy="22" r="3" fill="#2f3b45"/><circle cx="24" cy="22" r="3" fill="#2f3b45"/>
    <line x1="17" y1="10" x2="17" y2="2" stroke="#2f3b45" stroke-width="2"/><circle cx="17" cy="2" r="2.5" fill="#c2571a"/>
  </g>
  <text class="sml" x="1498" y="352">답변 · conversation state</text>
  <text class="sml" x="1450" y="398">토큰 단위 실시간 전송</text>

  <!-- ===================== NODE LIBRARY ===================== -->
  <rect class="grpK" x="46" y="470" width="1614" height="150" rx="16"/>
  <text class="hdr2" x="66" y="502">Node Library — 65 modules / 20 categories</text>

  <rect class="peach" x="66" y="518" width="296" height="60" rx="10"/>
  <text class="lbl" x="82" y="542">검색</text>
  <text class="sml" x="82" y="562">전처리 · retrieval · 후처리 · rerank</text>
  <rect class="blue" x="382" y="518" width="296" height="60" rx="10"/>
  <text class="lbl" x="398" y="542">생성</text>
  <text class="sml" x="398" y="562">LLM answer · prompt 구성</text>
  <rect class="purp" x="698" y="518" width="296" height="60" rx="10"/>
  <text class="lbl" x="714" y="542">라우팅</text>
  <text class="sml" x="714" y="562">분기 · 루프 · 조건 실행</text>
  <rect class="green" x="1014" y="518" width="296" height="60" rx="10"/>
  <text class="lbl" x="1030" y="542">Ingestion</text>
  <text class="sml" x="1030" y="562">데이터셋 적재 · 전처리</text>
  <rect class="amber" x="1330" y="518" width="296" height="60" rx="10"/>
  <text class="lbl" x="1346" y="542">멀티모달</text>
  <text class="sml" x="1346" y="562">vision · 이미지 이해</text>

  <text class="sml" x="66" y="606">멀티벡터 검색 · 법령 준수 검증도 노드로 등록 — workflow에 그대로 꽂아 재사용</text>

  <!-- ===================== caption ===================== -->
  <line x1="46" y1="644" x2="1660" y2="644" stroke="#333c44" stroke-width="2" stroke-dasharray="12 8"/>
  <text class="sub" x="46" y="674">Figure. Agent Builder 실행 경로 — canvas의 workflow가 JSON spec으로 직렬화되고 LangGraph StateGraph로 빌드·실행되며, retrieval 노드는 검색 모드 5종을 파라미터로 받는다. 답변은 SSE로 스트리밍된다.</text>
</svg>
