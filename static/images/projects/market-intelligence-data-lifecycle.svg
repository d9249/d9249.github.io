<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Market Intelligence data lifecycle</title>
  <desc id="desc">Plans and workflows stay internal, while daily updates are synchronized to Bedrock Knowledge Base and surfaced in the documents UI.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .track { fill: #ffffff; stroke: #d8dee9; stroke-width: 2; rx: 24; }
      .node rect { stroke-width: 2; rx: 16; }
      .node text { fill: #0f172a; font: 700 18px system-ui, -apple-system, Segoe UI, sans-serif; }
      .node .sub { fill: #475569; font: 500 14px system-ui, -apple-system, Segoe UI, sans-serif; }
      .input rect { fill: #ecfeff; stroke: #0891b2; }
      .internal rect { fill: #fff7ed; stroke: #ea580c; }
      .publish rect { fill: #f0fdf4; stroke: #16a34a; }
      .kb rect { fill: #fdf2f8; stroke: #db2777; }
      .ui rect { fill: #eef2ff; stroke: #4f46e5; }
      .line { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .soft { fill: none; stroke: #64748b; stroke-width: 3; stroke-dasharray: 8 8; marker-end: url(#arrow); }
      .title { fill: #475569; font: 800 20px system-ui, -apple-system, Segoe UI, sans-serif; }
      .label { fill: #64748b; font: 600 13px system-ui, -apple-system, Segoe UI, sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <rect class="track" x="44" y="64" width="1192" height="560"/>
  <text class="title" x="76" y="104">S3 data lifecycle</text>

  <g class="node input" transform="translate(90 170)">
    <rect width="230" height="112"/>
    <text x="24" y="38"><tspan>Input Data</tspan></text>
    <text class="sub" x="24" y="66"><tspan>00_input_data</tspan></text>
    <text class="sub" x="24" y="88"><tspan>RFP source files</tspan></text>
  </g>
  <g class="node internal" transform="translate(380 170)">
    <rect width="230" height="112"/>
    <text x="24" y="38"><tspan>Plans</tspan></text>
    <text class="sub" x="24" y="66"><tspan>search_plan.json</tspan></text>
    <text class="sub" x="24" y="88"><tspan>internal only</tspan></text>
  </g>
  <g class="node internal" transform="translate(670 170)">
    <rect width="230" height="112"/>
    <text x="24" y="38"><tspan>Workflows</tspan></text>
    <text class="sub" x="24" y="66"><tspan>agent results</tspan></text>
    <text class="sub" x="24" y="88"><tspan>status metadata</tspan></text>
  </g>
  <g class="node publish" transform="translate(960 170)">
    <rect width="230" height="112"/>
    <text x="24" y="38"><tspan>Daily Updates</tspan></text>
    <text class="sub" x="24" y="66"><tspan>final reports</tspan></text>
    <text class="sub" x="24" y="88"><tspan>deduplicated sources</tspan></text>
  </g>

  <g class="node kb" transform="translate(670 420)">
    <rect width="230" height="112"/>
    <text x="24" y="38"><tspan>Market KB</tspan></text>
    <text class="sub" x="24" y="66"><tspan>Bedrock ingestion</tspan></text>
    <text class="sub" x="24" y="88"><tspan>searchable reports</tspan></text>
  </g>
  <g class="node ui" transform="translate(960 420)">
    <rect width="230" height="112"/>
    <text x="24" y="38"><tspan>Documents UI</tspan></text>
    <text class="sub" x="24" y="66"><tspan>folders, projects</tspan></text>
    <text class="sub" x="24" y="88"><tspan>workflow agents</tspan></text>
  </g>

  <path class="line" d="M320 226 H380"/>
  <path class="line" d="M610 226 H670"/>
  <path class="line" d="M900 226 H960"/>
  <path class="line" d="M1075 282 V360 H785 V420"/>
  <text class="label" x="832" y="346">only final reports</text>
  <path class="line" d="M1075 282 V420"/>
  <path class="soft" d="M785 282 V360 H1075 V420"/>
  <text class="label" x="804" y="384">operator can inspect raw workflow</text>
</svg>
