<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="900" viewBox="0 0 2000 900" role="img" aria-labelledby="t d">
  <title id="t">ArtygenSpace Document OCR Engine — paper figure style</title>
  <desc id="d">Image and PDF pages pass through GroundingDINO detection, crop preprocessing, Google Vision and Surya recognition, layout detection, and become review artifacts and endpoint experiments.</desc>
  <defs>
    <marker id="sage" viewBox="0 0 12 12" refX="8" refY="6" markerWidth="4.5" markerHeight="4.5" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 z" fill="#b7cfb2"/>
    </marker>
    <marker id="dark" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 z" fill="#2f3b45"/>
    </marker>
    <style>
      .hdr  { font: italic 700 27px Georgia, "Times New Roman", serif; fill: #17222b; }
      .hdr2 { font: 700 20px Georgia, "Times New Roman", serif; fill: #17222b; }
      .sub  { font: italic 500 15px Georgia, serif; fill: #5c6a75; }
      .lbl  { font: 600 14.5px -apple-system, "Segoe UI", sans-serif; fill: #2f3b45; }
      .sml  { font: 500 12.5px -apple-system, "Segoe UI", sans-serif; fill: #5c6a75; }
      .step { font: 800 19px Georgia, serif; fill: #c2571a; }
      .qtxt { font: italic 600 16px Georgia, serif; fill: #7a3d12; }
      .grpB { fill: #fdfefe; stroke: #4a7fa5; stroke-width: 2.5; stroke-dasharray: 11 8; }
      .grpK { fill: none; stroke: #333c44; stroke-width: 2.5; stroke-dasharray: 9 7; }
      .grpO { fill: #fffcf8; stroke: #c2571a; stroke-width: 2.5; stroke-dasharray: 9 7; }
      .pill { fill: #ffffff; stroke: #333c44; stroke-width: 2; stroke-dasharray: 7 5; }
      .peach{ fill: #fdefe2; stroke: #d9b38c; stroke-width: 1.6; }
      .blue { fill: #e8f1fa; stroke: #a9c6e0; stroke-width: 1.6; }
      .purp { fill: #efe9f7; stroke: #c3aede; stroke-width: 1.6; }
      .green{ fill: #e6f2e8; stroke: #a9cdb1; stroke-width: 1.6; }
      .amber{ fill: #fdf3dd; stroke: #dfc084; stroke-width: 1.8; }
      .flow { fill: none; stroke: #c9dcc5; stroke-width: 15; stroke-linecap: round; marker-end: url(#sage); }
      .thin { fill: none; stroke: #2f3b45; stroke-width: 2.2; marker-end: url(#dark); }
      .ink  { stroke: #2f3b45; stroke-width: 1.8; fill: #fff; }
    </style>
  </defs>
  <rect width="2000" height="900" fill="#ffffff"/>

  <!-- ===================== INPUT PAGES ===================== -->
  <rect class="grpK" x="42" y="150" width="196" height="620" rx="18"/>
  <text class="hdr2" x="58" y="136">Input Pages</text>
  <g transform="translate(96,230)">
    <path class="ink" d="M0 0 H62 L82 20 V92 H0 Z"/><path class="ink" d="M62 0 V20 H82" fill="none"/>
    <circle cx="30" cy="44" r="13" fill="#fdefe2" stroke="#d9b38c" stroke-width="2"/>
    <path d="M16 76 L34 54 L48 66 L60 52 L66 76 Z" fill="#e6f2e8" stroke="#a9cdb1" stroke-width="2"/>
    <text class="lbl" x="10" y="118">책 이미지</text>
  </g>
  <g transform="translate(96,440)">
    <path class="ink" d="M0 0 H62 L82 20 V92 H0 Z"/><path class="ink" d="M62 0 V20 H82" fill="none"/>
    <line x1="14" y1="38" x2="66" y2="38" stroke="#8a97a1" stroke-width="3"/><line x1="14" y1="54" x2="66" y2="54" stroke="#8a97a1" stroke-width="3"/><line x1="14" y1="70" x2="48" y2="70" stroke="#8a97a1" stroke-width="3"/>
    <text class="lbl" x="20" y="118">PDF</text>
    <text class="sml" x="-14" y="140">page 렌더링 후 처리</text>
  </g>
  <path class="flow" d="M244 460 H278"/>

  <!-- ===================== 1) DETECTION & CROP ===================== -->
  <text class="step" x="296" y="136">1)</text>
  <text class="hdr" x="328" y="136">Detection &amp; Crop</text>
  <rect class="grpB" x="288" y="150" width="470" height="620" rx="20"/>
  <text class="sub" x="312" y="184">open-vocabulary 탐지로 텍스트 영역 후보 생성</text>

  <rect class="pill" x="312" y="220" width="240" height="56" rx="28"/>
  <g transform="translate(330,238)"><path d="M11 0 L13 8 L21 10 L13 12 L11 20 L9 12 L1 10 L9 8 Z" fill="#c2571a"/></g>
  <text class="lbl" x="360" y="242">GroundingDINO</text>
  <text class="sml" x="360" y="262">caption prompt · threshold</text>

  <path class="thin" d="M432 276 V308"/>
  <rect class="peach" x="312" y="312" width="240" height="84" rx="12"/>
  <text class="lbl" x="330" y="342">Text Region Boxes</text>
  <text class="sml" x="330" y="366">normalized box → 원본 좌표</text>

  <path class="thin" d="M432 396 V428"/>
  <rect class="green" x="312" y="432" width="240" height="96" rx="12"/>
  <text class="lbl" x="330" y="462">Crop &amp; Preprocess</text>
  <text class="sml" x="330" y="486">grayscale · CLAHE</text>
  <text class="sml" x="330" y="506">sharpen · denoise</text>

  <path class="thin" d="M556 480 H588"/>
  <g transform="translate(592,438)">
    <rect class="peach" x="0" y="0" width="110" height="34" rx="8"/>
    <rect class="peach" x="0" y="42" width="110" height="34" rx="8"/>
    <rect class="peach" x="0" y="84" width="110" height="34" rx="8"/>
    <text class="sml" x="6" y="142">crop images</text>
    <text class="sml" x="6" y="162">빈 영역 제외</text>
  </g>

  <text class="sml" x="312" y="620">box filtering · merging으로</text>
  <text class="sml" x="312" y="642">중복 영역 정리</text>

  <path class="flow" d="M764 460 H798"/>

  <!-- ===================== 2) OCR & LAYOUT ===================== -->
  <text class="step" x="816" y="136">2)</text>
  <text class="hdr" x="848" y="136">OCR &amp; Layout Analysis</text>
  <rect class="grpB" x="808" y="150" width="560" height="620" rx="20"/>
  <text class="sub" x="832" y="184">인식과 문서 구조를 분리해 다룬다</text>

  <rect class="grpK" x="832" y="204" width="510" height="230" rx="16"/>
  <text class="hdr2" x="850" y="236">OCR Recognition</text>
  <rect class="blue" x="850" y="254" width="190" height="64" rx="10"/>
  <text class="lbl" x="866" y="280">Google Vision</text>
  <text class="sml" x="866" y="302">crop 영역 OCR</text>
  <rect class="blue" x="1060" y="254" width="190" height="64" rx="10"/>
  <text class="lbl" x="1076" y="280">Surya Recognition</text>
  <text class="sml" x="1076" y="302">다국어 line 인식</text>
  <path fill="none" stroke="#2f3b45" stroke-width="2.2" d="M945 318 V346 M1155 318 V346 M945 346 H1155"/>
  <circle cx="945" cy="346" r="4" fill="#2f3b45"/><circle cx="1155" cy="346" r="4" fill="#2f3b45"/>
  <path class="thin" d="M1050 346 V366"/>
  <rect class="peach" x="900" y="370" width="300" height="52" rx="10"/>
  <text class="lbl" x="920" y="402">text line · confidence · bbox</text>

  <rect class="grpK" x="832" y="470" width="510" height="180" rx="16"/>
  <text class="hdr2" x="850" y="502">Layout Detection</text>
  <rect class="pill" x="850" y="520" width="220" height="44" rx="22"/>
  <text class="lbl" x="872" y="547">Surya Layout Predictor</text>
  <path class="thin" d="M1074 542 H1086"/>
  <rect class="green" x="1090" y="520" width="112" height="34" rx="8"/><text class="sml" x="1104" y="542">title</text>
  <rect class="green" x="1210" y="520" width="112" height="34" rx="8"/><text class="sml" x="1224" y="542">body</text>
  <rect class="green" x="1090" y="562" width="112" height="34" rx="8"/><text class="sml" x="1104" y="584">table</text>
  <rect class="green" x="1210" y="562" width="112" height="34" rx="8"/><text class="sml" x="1224" y="584">figure</text>
  <text class="sml" x="850" y="608">PDF/이미지의 영역 label과 debug image 반환</text>

  <rect class="pill" x="832" y="690" width="340" height="56" rx="28"/>
  <g transform="translate(850,708)"><path d="M11 0 L13 8 L21 10 L13 12 L11 20 L9 12 L1 10 L9 8 Z" fill="#4a7fa5"/></g>
  <text class="lbl" x="880" y="713">LLM 후처리</text>
  <text class="sml" x="880" y="733">문장 · 사운드 효과 후보 정리</text>

  <path class="flow" d="M1374 460 H1408"/>

  <!-- ===================== 3) ARTIFACTS & SERVING ===================== -->
  <text class="step" x="1426" y="136">3)</text>
  <text class="hdr" x="1458" y="136">Artifacts &amp; Serving</text>
  <rect class="grpB" x="1418" y="150" width="540" height="620" rx="20"/>
  <text class="sub" x="1442" y="184">검수 가능한 산출물과 배포 실험</text>

  <rect class="grpK" x="1442" y="204" width="492" height="240" rx="16"/>
  <text class="hdr2" x="1460" y="236">Review Artifacts</text>
  <rect class="blue" x="1460" y="254" width="220" height="70" rx="10"/>
  <text class="lbl" x="1476" y="282">Annotated Image</text>
  <text class="sml" x="1476" y="306">box 시각화</text>
  <rect class="purp" x="1698" y="254" width="220" height="70" rx="10"/>
  <text class="lbl" x="1714" y="282">Merged Image</text>
  <text class="sml" x="1714" y="306">box 병합 결과</text>
  <rect class="peach" x="1460" y="340" width="220" height="70" rx="10"/>
  <text class="lbl" x="1476" y="368">Cropped Zip</text>
  <text class="sml" x="1476" y="392">영역 crop 묶음</text>
  <rect class="green" x="1698" y="340" width="220" height="70" rx="10"/>
  <text class="lbl" x="1714" y="368">YOLO JSON</text>
  <text class="sml" x="1714" y="392">좌표 결과 포맷</text>

  <path class="thin" d="M1688 444 V468"/>
  <rect class="grpK" x="1442" y="472" width="492" height="100" rx="16"/>
  <text class="hdr2" x="1460" y="504">다음 AI 기능</text>
  <text class="sml" x="1460" y="532">교정 · 번역 · 퀴즈 · TTS · 사운드 추천</text>

  <rect class="grpK" x="1442" y="612" width="492" height="148" rx="16"/>
  <text class="hdr2" x="1460" y="644">Endpoint Packaging</text>
  <text class="sml" x="1460" y="672">SageMaker inference app · serve script</text>
  <text class="sml" x="1460" y="694">endpoint invocation test</text>
  <text class="sml" x="1460" y="716">base64 image 요청 → JSON 응답</text>

  <!-- ===================== caption ===================== -->
  <line x1="42" y1="800" x2="1958" y2="800" stroke="#333c44" stroke-width="2" stroke-dasharray="12 8"/>
  <text class="sub" x="42" y="836">Figure. Document OCR Engine 전체 파이프라인 — 이미지/PDF 페이지는 GroundingDINO 탐지와 crop 전처리를 거쳐 Google Vision·Surya 인식, Surya layout 분석으로 텍스트·영역·좌표가 되고, annotated image·crop zip·YOLO JSON 검수 artifact와 SageMaker endpoint 실험으로 이어진다.</text>
  <text class="sub" x="42" y="862">OCR을 recognition 하나가 아니라 detection → crop → 인식 → layout → LLM 후처리 → artifact로 이어지는 제품형 pipeline으로 설계했다.</text>
</svg>
