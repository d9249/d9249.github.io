<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Agent Skills 개발 생애주기</title>
  <desc id="desc">Agent Skills가 명세, 계획, 구현, 테스트, 리뷰, 단순화, 출시를 일곱 개의 개발 게이트로 고정하는 구조도.</desc>
  <defs>
    <style>
      text{font-family:"Apple SD Gothic Neo","Noto Sans CJK KR","Pretendard",system-ui,sans-serif}
      .bg{fill:#f7fafc}
      .panel{fill:#fff;stroke:#d9e3ef;stroke-width:2}
      .kicker{font-size:22px;font-weight:800;fill:#0f766e}
      .title{font-size:50px;font-weight:900;fill:#111827}
      .sub{font-size:25px;font-weight:600;fill:#52627a}
      .section{font-size:22px;font-weight:900;fill:#0f766e}
      .step{font-size:27px;font-weight:900;fill:#111827}
      .stepSub{font-size:19px;font-weight:700;fill:#52627a}
      .num{font-size:25px;font-weight:900;fill:#fff}
      .metric{font-size:50px;font-weight:900;fill:#0f766e}
      .cardTitle{font-size:28px;font-weight:900;fill:#111827}
      .cardBody{font-size:22px;font-weight:650;fill:#52627a}
      .rail{stroke:#cbd5e1;stroke-width:4;stroke-linecap:round}
      .card{fill:#fff;stroke:#d9e3ef;stroke-width:2}
    </style>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect x="64" y="52" width="1472" height="792" rx="34" class="panel"/>

  <text x="104" y="112" class="kicker">개발 생애주기</text>
  <text x="104" y="174" class="title">Agent Skills는 개발 절차를 일곱 개 게이트로 고정한다</text>
  <text x="104" y="222" class="sub">에이전트가 바로 구현으로 뛰어들지 않도록, 명령과 스킬이 작업 리듬을 나눈다.</text>

  <rect x="104" y="290" width="1388" height="250" rx="26" fill="#f8fbff" stroke="#d9e3ef" stroke-width="2"/>
  <text x="134" y="338" class="section">7개 진입 명령</text>
  <line x1="170" y1="405" x2="1430" y2="405" class="rail"/>

  <g transform="translate(170 0)">
    <circle cx="0" cy="405" r="37" fill="#0f766e"/><text x="0" y="414" text-anchor="middle" class="num">1</text>
    <text x="0" y="477" text-anchor="middle" class="step">명세</text>
    <text x="0" y="510" text-anchor="middle" class="stepSub">요구 정리</text>
  </g>
  <g transform="translate(380 0)">
    <circle cx="0" cy="405" r="37" fill="#0369a1"/><text x="0" y="414" text-anchor="middle" class="num">2</text>
    <text x="0" y="477" text-anchor="middle" class="step">계획</text>
    <text x="0" y="510" text-anchor="middle" class="stepSub">작업 분해</text>
  </g>
  <g transform="translate(590 0)">
    <circle cx="0" cy="405" r="37" fill="#4f46e5"/><text x="0" y="414" text-anchor="middle" class="num">3</text>
    <text x="0" y="477" text-anchor="middle" class="step">구현</text>
    <text x="0" y="510" text-anchor="middle" class="stepSub">한 조각씩</text>
  </g>
  <g transform="translate(800 0)">
    <circle cx="0" cy="405" r="37" fill="#6d28d9"/><text x="0" y="414" text-anchor="middle" class="num">4</text>
    <text x="0" y="477" text-anchor="middle" class="step">테스트</text>
    <text x="0" y="510" text-anchor="middle" class="stepSub">증거 확보</text>
  </g>
  <g transform="translate(1010 0)">
    <circle cx="0" cy="405" r="37" fill="#be185d"/><text x="0" y="414" text-anchor="middle" class="num">5</text>
    <text x="0" y="477" text-anchor="middle" class="step">리뷰</text>
    <text x="0" y="510" text-anchor="middle" class="stepSub">위험 확인</text>
  </g>
  <g transform="translate(1220 0)">
    <circle cx="0" cy="405" r="37" fill="#b45309"/><text x="0" y="414" text-anchor="middle" class="num">6</text>
    <text x="0" y="477" text-anchor="middle" class="step">단순화</text>
    <text x="0" y="510" text-anchor="middle" class="stepSub">복잡도 제거</text>
  </g>
  <g transform="translate(1430 0)">
    <circle cx="0" cy="405" r="37" fill="#15803d"/><text x="0" y="414" text-anchor="middle" class="num">7</text>
    <text x="0" y="477" text-anchor="middle" class="step">출시</text>
    <text x="0" y="510" text-anchor="middle" class="stepSub">판단과 롤백</text>
  </g>

  <rect x="104" y="602" width="410" height="170" rx="24" class="card"/>
  <text x="138" y="652" class="cardTitle">스킬</text>
  <text x="138" y="705" class="metric">22</text>
  <text x="222" y="697" class="cardBody">절차와 검증 기준</text>
  <text x="222" y="728" class="cardBody">회피 패턴을 문서화</text>

  <rect x="595" y="602" width="410" height="170" rx="24" class="card"/>
  <text x="629" y="652" class="cardTitle">페르소나</text>
  <text x="629" y="705" class="metric">3</text>
  <text x="713" y="697" class="cardBody">리뷰어 · 보안 감사자</text>
  <text x="713" y="728" class="cardBody">테스트 엔지니어</text>

  <rect x="1086" y="602" width="410" height="170" rx="24" class="card"/>
  <text x="1120" y="652" class="cardTitle">배포 표면</text>
  <text x="1120" y="705" class="metric">7</text>
  <text x="1204" y="697" class="cardBody">여러 하네스에</text>
  <text x="1204" y="728" class="cardBody">같은 절차를 적용</text>

</svg>
