<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Agent Skills lifecycle diagram</title>
  <desc id="desc">A reconstructed diagram of addyosmani/agent-skills: slash commands map the software lifecycle to skills, personas, references, hooks, and host integrations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#101b33"/>
      <stop offset="1" stop-color="#182544"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#93c5fd"/>
    </marker>
    <style>
      .title { font: 800 54px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #f8fafc; letter-spacing: -1.2px; }
      .subtitle { font: 500 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #cbd5e1; }
      .label { font: 800 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #f8fafc; }
      .small { font: 600 17px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #cbd5e1; }
      .micro { font: 700 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #93c5fd; letter-spacing: 0.6px; }
      .box { fill: rgba(15, 23, 42, 0.82); stroke: rgba(148, 163, 184, 0.34); stroke-width: 1.5; }
      .thin { stroke: rgba(147, 197, 253, 0.55); stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1275" cy="120" r="330" fill="#2563eb" opacity="0.12"/>
  <circle cx="180" cy="780" r="300" fill="#a855f7" opacity="0.11"/>
  <text x="86" y="100" class="title">Agent Skills</text>
  <text x="88" y="138" class="subtitle">Production engineering workflows packaged for AI coding agents</text>
  <g transform="translate(86,188)">
    <rect width="1428" height="108" rx="26" class="box" filter="url(#shadow)"/>
    <text x="34" y="45" class="micro">USER-FACING LIFECYCLE COMMANDS</text>
    <g transform="translate(34,62)">
      <g><rect width="150" height="46" rx="16" fill="#0f766e"/><text x="75" y="31" text-anchor="middle" class="small" fill="#ecfeff">/spec</text></g>
      <g transform="translate(185,0)"><rect width="150" height="46" rx="16" fill="#2563eb"/><text x="75" y="31" text-anchor="middle" class="small" fill="#eff6ff">/plan</text></g>
      <g transform="translate(370,0)"><rect width="150" height="46" rx="16" fill="#4f46e5"/><text x="75" y="31" text-anchor="middle" class="small" fill="#eef2ff">/build</text></g>
      <g transform="translate(555,0)"><rect width="150" height="46" rx="16" fill="#7c3aed"/><text x="75" y="31" text-anchor="middle" class="small" fill="#f5f3ff">/test</text></g>
      <g transform="translate(740,0)"><rect width="150" height="46" rx="16" fill="#db2777"/><text x="75" y="31" text-anchor="middle" class="small" fill="#fdf2f8">/review</text></g>
      <g transform="translate(925,0)"><rect width="190" height="46" rx="16" fill="#f97316"/><text x="95" y="31" text-anchor="middle" class="small" fill="#fff7ed">/code-simplify</text></g>
      <g transform="translate(1150,0)"><rect width="150" height="46" rx="16" fill="#16a34a"/><text x="75" y="31" text-anchor="middle" class="small" fill="#f0fdf4">/ship</text></g>
    </g>
  </g>
  <path d="M800 315 V370" class="thin"/>
  <g transform="translate(86,386)">
    <rect width="452" height="310" rx="28" class="box" filter="url(#shadow)"/>
    <rect x="26" y="26" width="92" height="92" rx="25" fill="url(#cyan)" opacity="0.95"/>
    <text x="72" y="86" text-anchor="middle" font-size="42" font-weight="900" fill="#082f49">22</text>
    <text x="140" y="58" class="label">Skills</text>
    <text x="140" y="90" class="small">the HOW</text>
    <text x="34" y="148" class="small">Spec, planning, incremental build,</text>
    <text x="34" y="178" class="small">TDD, context, source-driven dev,</text>
    <text x="34" y="208" class="small">debugging, review, security,</text>
    <text x="34" y="238" class="small">performance, docs, CI/CD, launch</text>
    <text x="34" y="280" class="micro">SKILL.md + process + verification gates</text>
  </g>
  <g transform="translate(574,386)">
    <rect width="452" height="310" rx="28" class="box" filter="url(#shadow)"/>
    <rect x="26" y="26" width="92" height="92" rx="25" fill="url(#violet)" opacity="0.95"/>
    <text x="72" y="86" text-anchor="middle" font-size="42" font-weight="900" fill="#2e1065">3</text>
    <text x="140" y="58" class="label">Personas</text>
    <text x="140" y="90" class="small">the WHO</text>
    <text x="34" y="148" class="small">code-reviewer</text>
    <text x="34" y="178" class="small">security-auditor</text>
    <text x="34" y="208" class="small">test-engineer</text>
    <text x="34" y="250" class="small">/ship fans them out in parallel,</text>
    <text x="34" y="280" class="micro">main agent merges go/no-go + rollback</text>
  </g>
  <g transform="translate(1062,386)">
    <rect width="452" height="310" rx="28" class="box" filter="url(#shadow)"/>
    <rect x="26" y="26" width="92" height="92" rx="25" fill="url(#green)" opacity="0.95"/>
    <text x="72" y="86" text-anchor="middle" font-size="42" font-weight="900" fill="#052e16">7</text>
    <text x="140" y="58" class="label">Integrations</text>
    <text x="140" y="90" class="small">the WHERE</text>
    <text x="34" y="148" class="small">Claude Code plugin + commands</text>
    <text x="34" y="178" class="small">Gemini CLI command mirrors</text>
    <text x="34" y="208" class="small">Cursor, Copilot, Windsurf docs</text>
    <text x="34" y="238" class="small">OpenCode / Kiro guidance</text>
    <text x="34" y="280" class="micro">manifests, hooks, CI validation</text>
  </g>
  <path d="M538 541 H574" class="thin"/>
  <path d="M1026 541 H1062" class="thin"/>
  <g transform="translate(86,744)">
    <rect width="1428" height="86" rx="24" fill="rgba(30,41,59,0.82)" stroke="rgba(148,163,184,0.28)"/>
    <text x="34" y="35" class="micro">CORE CLAIM</text>
    <text x="34" y="64" class="subtitle">Turn senior-engineering habits into reusable, verifiable, host-portable agent workflows.</text>
  </g>
</svg>
