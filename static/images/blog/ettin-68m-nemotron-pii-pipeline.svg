<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ETTIN-68M Nemotron PII 탐지 파이프라인</title>
  <desc id="desc">입력 스트림이 ETTIN 인코더, BIO 스팬 헤드, 후처리 조치로 이동하는 개인정보 탐지 파이프라인.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L11,6 L2,10 Z" fill="#0369a1"/>
    </marker>
    <style>
      text{font-family:"Apple SD Gothic Neo","Noto Sans CJK KR","Pretendard",system-ui,sans-serif}
      .bg{fill:#f7fafc}
      .panel{fill:#fff;stroke:#d9e3ef;stroke-width:2}
      .kicker{font-size:22px;font-weight:800;fill:#0369a1}
      .title{font-size:50px;font-weight:900;fill:#111827}
      .sub{font-size:25px;font-weight:600;fill:#52627a}
      .card{fill:#fff;stroke:#d9e3ef;stroke-width:2}
      .cardBlue{fill:#eef8ff;stroke:#7dd3fc;stroke-width:3}
      .cardYellow{fill:#fff9eb;stroke:#facc15;stroke-width:3}
      .h{font-size:31px;font-weight:900;fill:#111827}
      .body{font-size:23px;font-weight:650;fill:#475569}
      .chip{font-size:21px;font-weight:850;fill:#0f172a}
      .metric{font-size:48px;font-weight:900;fill:#0f766e}
      .metricText{font-size:23px;font-weight:700;fill:#475569}
      .line{stroke:#0369a1;stroke-width:4;stroke-linecap:round;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect x="64" y="52" width="1472" height="792" rx="34" class="panel"/>

  <text x="104" y="112" class="kicker">개인정보 탐지 파이프라인</text>
  <text x="104" y="174" class="title">작은 토큰 분류기로 민감 스팬을 먼저 찾는다</text>
  <text x="104" y="222" class="sub">생성형 답변 모델이 아니라, 로그와 문서 앞단에 붙는 전처리 계층이다.</text>

  <rect x="104" y="318" width="282" height="220" rx="24" class="card"/>
  <text x="140" y="372" class="h">입력</text>
  <text x="140" y="422" class="body">로그</text>
  <text x="140" y="456" class="body">상담 기록</text>
  <text x="140" y="490" class="body">문서 조각</text>

  <path d="M406 428 H480" class="line"/>

  <rect x="500" y="292" width="330" height="272" rx="24" class="cardBlue"/>
  <text x="538" y="350" class="h">ETTIN 인코더</text>
  <text x="538" y="404" class="body">68M 파라미터</text>
  <text x="538" y="438" class="body">최대 약 8K 문맥</text>
  <text x="538" y="492" class="body">토큰 표현 생성</text>

  <path d="M850 428 H924" class="line"/>

  <rect x="944" y="292" width="330" height="272" rx="24" class="cardYellow"/>
  <text x="982" y="350" class="h">BIO 스팬 헤드</text>
  <text x="982" y="404" class="body">55개 PII/PHI 유형</text>
  <text x="982" y="438" class="body">107개 라벨 ID</text>
  <text x="982" y="492" class="body">문자 위치 출력</text>

  <path d="M1294 428 H1330" class="line"/>

  <rect x="1348" y="318" width="160" height="220" rx="24" class="card"/>
  <text x="1382" y="372" class="h">조치</text>
  <text x="1382" y="422" class="body">마스킹</text>
  <text x="1382" y="456" class="body">삭제</text>
  <text x="1382" y="490" class="body">리뷰</text>

  <rect x="104" y="640" width="420" height="116" rx="22" fill="#f8fbff" stroke="#d9e3ef" stroke-width="2"/>
  <text x="138" y="712" class="metric">100K</text>
  <text x="260" y="690" class="metricText">Nemotron-PII</text>
  <text x="260" y="724" class="metricText">합성 레코드</text>

  <rect x="580" y="640" width="420" height="116" rx="22" fill="#f8fbff" stroke="#d9e3ef" stroke-width="2"/>
  <text x="614" y="712" class="metric">96.27</text>
  <text x="774" y="690" class="metricText">모델 카드 기준</text>
  <text x="774" y="724" class="metricText">마이크로 F1</text>

  <rect x="1056" y="640" width="452" height="116" rx="22" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="1090" y="692" class="h" fill="#9a3412">주의</text>
  <text x="1212" y="690" class="metricText">영어 중심 모델</text>
  <text x="1212" y="724" class="metricText">한국어 로그는 별도 평가 필요</text>

</svg>
