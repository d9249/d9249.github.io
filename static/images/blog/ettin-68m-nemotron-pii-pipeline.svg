<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ETTIN-68M Nemotron PII pipeline diagram</title>
  <desc id="desc">A clean diagram showing input text and logs passing through an ETTIN 68M encoder, BIO span classifier, and redaction or masking pipeline, with model evidence cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="58%" stop-color="#0d2237"/>
      <stop offset="100%" stop-color="#102b24"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="12" refY="9" orient="auto">
      <path d="M2,2 L16,9 L2,16 Z" fill="#7dd3fc"/>
    </marker>
    <style>
      .label{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;fill:#e5eefb;font-weight:700;letter-spacing:.2px}
      .small{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;fill:#a8bed5;font-size:27px;line-height:1.4}
      .tiny{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;fill:#8aa6bf;font-size:22px}
      .mono{font-family:"SFMono-Regular","Cascadia Code","Menlo",monospace;fill:#dff7ff;font-size:26px}
      .card{fill:#10263d;stroke:#2f5b7a;stroke-width:2;rx:28;filter:url(#shadow)}
      .chip{fill:#183650;stroke:#3b82a6;stroke-width:1.5;rx:18}
      .accent{fill:url(#cyan)}
      .muted{fill:#20384d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1380" cy="130" r="260" fill="#0ea5e9" opacity="0.10"/>
  <circle cx="170" cy="800" r="300" fill="#14b8a6" opacity="0.08"/>

  <text x="90" y="92" class="label" font-size="50">ETTIN-68M Nemotron PII</text>
  <text x="90" y="138" class="small">lightweight token-classification layer for PII / PHI detection</text>

  <rect x="90" y="214" width="330" height="270" class="card"/>
  <text x="125" y="270" class="label" font-size="34">Input stream</text>
  <text x="125" y="324" class="mono">logs</text>
  <text x="125" y="365" class="mono">support tickets</text>
  <text x="125" y="406" class="mono">documents</text>
  <rect x="125" y="430" width="230" height="38" class="chip"/>
  <text x="143" y="457" class="tiny">names, IDs, secrets</text>

  <path d="M438 350 C500 350 520 350 570 350" stroke="#7dd3fc" stroke-width="8" fill="none" marker-end="url(#arrow)"/>

  <rect x="590" y="180" width="420" height="340" class="card"/>
  <text x="632" y="245" class="label" font-size="34">ETTIN encoder</text>
  <text x="632" y="295" class="small">68.46M BF16 parameters</text>
  <text x="632" y="335" class="small">ModernBERT-style encoder</text>
  <text x="632" y="375" class="small">19 layers · 512 hidden · 8 heads</text>
  <rect x="632" y="416" width="318" height="56" fill="url(#cyan)" rx="20" opacity="0.95"/>
  <text x="660" y="453" font-family="-apple-system,BlinkMacSystemFont,Inter,Segoe UI,sans-serif" font-size="25" font-weight="800" fill="#062032">context up to ~8K tokens</text>

  <path d="M1032 350 C1095 350 1118 350 1165 350" stroke="#7dd3fc" stroke-width="8" fill="none" marker-end="url(#arrow)"/>

  <rect x="1185" y="214" width="325" height="270" class="card"/>
  <text x="1222" y="270" class="label" font-size="34">BIO span head</text>
  <text x="1222" y="324" class="small">55 PII/PHI types</text>
  <text x="1222" y="365" class="small">107 labels incl. O</text>
  <text x="1222" y="406" class="small">NER pipeline output</text>
  <rect x="1222" y="430" width="200" height="38" fill="url(#amber)" rx="18"/>
  <text x="1242" y="457" class="tiny" fill="#27170a">mask or route</text>

  <rect x="155" y="610" width="360" height="165" fill="#0f2438" stroke="#2f5b7a" stroke-width="2" rx="26"/>
  <text x="190" y="666" class="label" font-size="29">Training signal</text>
  <text x="190" y="712" class="small">NVIDIA Nemotron-PII</text>
  <text x="190" y="750" class="tiny">100K synthetic records · 50+ industries</text>

  <rect x="620" y="610" width="360" height="165" fill="#0f2438" stroke="#2f5b7a" stroke-width="2" rx="26"/>
  <text x="655" y="666" class="label" font-size="29">Reported metric</text>
  <text x="655" y="712" class="small">F1 96.27 · precision 96.35</text>
  <text x="655" y="750" class="tiny">10K test instances on Nemotron-PII</text>

  <rect x="1085" y="610" width="360" height="165" fill="#0f2438" stroke="#2f5b7a" stroke-width="2" rx="26"/>
  <text x="1120" y="666" class="label" font-size="29">Deployment posture</text>
  <text x="1120" y="712" class="small">MIT · Transformers</text>
  <text x="1120" y="750" class="tiny">English only; validate before compliance use</text>

  <text x="90" y="835" class="tiny">Diagram reconstructed from the Hugging Face model card, config.json, and Nemotron-PII dataset card.</text>
</svg>
