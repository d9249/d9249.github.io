<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#10233D"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 170) rotate(90) scale(250 250)">
      <stop stop-color="#00C2FF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#00C2FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1320 170) rotate(90) scale(300 300)">
      <stop stop-color="#7C5CFF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 720) rotate(90) scale(260 260)">
      <stop stop-color="#00FFB7" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#00FFB7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="panelShadow" x="-10%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#000814" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#64D6FF"/>
      <stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>
    <style>
      .eyebrow { font: 600 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; letter-spacing: 0.18em; fill: #8FB6E8; }
      .title { font: 700 64px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #F3F8FF; }
      .subtitle { font: 500 34px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #B9D2FF; }
      .label { font: 700 36px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #EEF5FF; }
      .small { font: 600 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #D5E3FA; letter-spacing: 0.08em; }
      .footer { font: 500 26px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #95BFDF; }
      .micro { font: 600 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #D8E6FA; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="280" cy="170" r="260" fill="url(#glowCyan)" filter="url(#softBlur)"/>
  <circle cx="1320" cy="170" r="320" fill="url(#glowPurple)" filter="url(#softBlur)"/>
  <circle cx="1180" cy="720" r="270" fill="url(#glowGreen)" filter="url(#softBlur)"/>

  <g opacity="0.08">
    <path d="M0 96H1600M0 160H1600M0 224H1600M0 288H1600M0 352H1600M0 416H1600M0 480H1600M0 544H1600M0 608H1600M0 672H1600M0 736H1600M0 800H1600" stroke="white"/>
    <path d="M96 0V900M160 0V900M224 0V900M288 0V900M352 0V900M416 0V900M480 0V900M544 0V900M608 0V900M672 0V900M736 0V900M800 0V900M864 0V900M928 0V900M992 0V900M1056 0V900M1120 0V900M1184 0V900M1248 0V900M1312 0V900M1376 0V900M1440 0V900M1504 0V900" stroke="white"/>
  </g>

  <rect x="92" y="112" width="1416" height="676" rx="30" fill="#0A1528" stroke="#496281" stroke-width="2" filter="url(#panelShadow)"/>

  <text x="150" y="158" class="eyebrow">GENERATED COVER CONCEPT</text>
  <text x="150" y="236" class="title">NeMo Data Designer</text>
  <text x="150" y="304" class="subtitle">Synthetic data is not just prompting.</text>
  <text x="150" y="350" class="subtitle">It is a reproducible pipeline of sampling, generation, and validation.</text>

  <rect x="1208" y="132" width="246" height="54" rx="16" fill="#12233C" stroke="#607CA3"/>
  <text x="1238" y="166" class="micro">AI LAB REPORT</text>

  <g opacity="0.75">
    <line x1="392" y1="480" x2="614" y2="480" stroke="url(#arrowGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M614 480L590 464V496L614 480Z" fill="#7C5CFF"/>
    <line x1="812" y1="480" x2="1034" y2="480" stroke="url(#arrowGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M1034 480L1010 464V496L1034 480Z" fill="#00FFB7"/>
  </g>

  <g>
    <circle cx="300" cy="480" r="96" stroke="#00C2FF" stroke-width="3" opacity="0.85"/>
    <circle cx="300" cy="480" r="72" fill="#101C31" stroke="#DAE8FF" stroke-width="2"/>
    <circle cx="300" cy="448" r="9" fill="#00C2FF"/>
    <circle cx="327" cy="464" r="9" fill="#00C2FF"/>
    <circle cx="327" cy="496" r="9" fill="#00C2FF"/>
    <circle cx="300" cy="512" r="9" fill="#00C2FF"/>
    <circle cx="273" cy="496" r="9" fill="#00C2FF"/>
    <circle cx="273" cy="464" r="9" fill="#00C2FF"/>
    <circle cx="300" cy="480" r="11" fill="#F6FBFF"/>
    <text x="300" y="620" text-anchor="middle" class="label">Statistical</text>
    <text x="300" y="660" text-anchor="middle" class="label">Sampling</text>
  </g>

  <g>
    <circle cx="720" cy="480" r="96" stroke="#7C5CFF" stroke-width="3" opacity="0.85"/>
    <circle cx="720" cy="480" r="72" fill="#17162E" stroke="#DAE8FF" stroke-width="2"/>
    <polygon points="720,442 754,461 754,499 720,518 686,499 686,461" fill="#2B1D51" stroke="#7C5CFF" stroke-width="3"/>
    <path d="M696 498L720 460L744 498" stroke="#F6FBFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="720" y="620" text-anchor="middle" class="label">Dependency-aware</text>
    <text x="720" y="660" text-anchor="middle" class="label">Generation</text>
  </g>

  <g>
    <circle cx="1140" cy="480" r="96" stroke="#00FFB7" stroke-width="3" opacity="0.9"/>
    <circle cx="1140" cy="480" r="72" fill="#122A29" stroke="#DAE8FF" stroke-width="2"/>
    <rect x="1107" y="447" width="66" height="66" rx="14" fill="#113634" stroke="#00FFB7" stroke-width="3"/>
    <path d="M1124 482L1138 496L1158 467" stroke="#F6FBFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1140" y="620" text-anchor="middle" class="label">Automated</text>
    <text x="1140" y="660" text-anchor="middle" class="label">Validation</text>
  </g>

  <text x="800" y="742" text-anchor="middle" class="footer">sampling → field correlation → validation → synthetic dataset</text>
</svg>