<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Reinforced Agent 실행 전 리뷰 게이트</title>
  <desc id="desc">사용자 요청에서 기본 에이전트의 임시 툴 호출, 리뷰어 검토, 승인된 호출 실행으로 이어지는 흐름과 수정 요청 루프를 보여주는 다이어그램.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L11,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L11,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .ink { fill: #111827; font-family: "Apple SD Gothic Neo", "Noto Sans CJK KR", "Pretendard", system-ui, sans-serif; }
      .muted { fill: #64748b; font-family: "Apple SD Gothic Neo", "Noto Sans CJK KR", "Pretendard", system-ui, sans-serif; }
      .title { fill: #111827; font-family: "Apple SD Gothic Neo", "Noto Sans CJK KR", "Pretendard", system-ui, sans-serif; font-size: 54px; font-weight: 900; }
      .h { fill: #111827; font-family: "Apple SD Gothic Neo", "Noto Sans CJK KR", "Pretendard", system-ui, sans-serif; font-size: 33px; font-weight: 900; }
      .body { fill: #334155; font-family: "Apple SD Gothic Neo", "Noto Sans CJK KR", "Pretendard", system-ui, sans-serif; font-size: 24px; font-weight: 650; }
      .small { fill: #475569; font-family: "Apple SD Gothic Neo", "Noto Sans CJK KR", "Pretendard", system-ui, sans-serif; font-size: 21px; font-weight: 650; }
      .white { fill: #ffffff; font-family: "Apple SD Gothic Neo", "Noto Sans CJK KR", "Pretendard", system-ui, sans-serif; font-size: 24px; font-weight: 900; }
      .card { fill: #ffffff; stroke: #dbe4f0; stroke-width: 2; }
      .flow { fill: none; stroke: #334155; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
      .return { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 10 12; marker-end: url(#arrowBlue); }
      .pillText { fill: #0f172a; font-family: "Apple SD Gothic Neo", "Noto Sans CJK KR", "Pretendard", system-ui, sans-serif; font-size: 22px; font-weight: 800; }
    </style>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect x="64" y="54" width="1472" height="792" rx="34" fill="#ffffff" stroke="#dfe7f0" stroke-width="2"/>

  <text x="104" y="118" class="muted" font-size="24" font-weight="800">Reinforced Agent</text>
  <text x="104" y="178" class="title">툴 호출을 실행 전에 한 번 더 검토하는 게이트</text>
  <text x="104" y="226" class="muted" font-size="27" font-weight="600">기본 에이전트의 임시 툴 호출을 바로 실행하지 않고, 별도 리뷰어가 오류와 부작용을 먼저 본다.</text>

  <g>
    <rect x="112" y="350" width="250" height="172" rx="24" class="card"/>
    <circle cx="172" cy="404" r="30" fill="#64748b"/>
    <text x="172" y="413" text-anchor="middle" class="white">1</text>
    <text x="214" y="411" class="h">사용자 요청</text>
    <text x="158" y="468" class="body">작업 + 맥락</text>
    <text x="158" y="504" class="small">외부 상태를 바꿀 수 있는 작업</text>
  </g>

  <path d="M362 436 H458" class="flow"/>

  <g>
    <rect x="458" y="324" width="300" height="224" rx="24" class="card"/>
    <rect x="458" y="324" width="300" height="62" rx="24" fill="#2563eb"/>
    <path d="M458 356 Q458 324 490 324 H726 Q758 324 758 356 V386 H458 Z" fill="#2563eb"/>
    <text x="608" y="365" text-anchor="middle" class="white">2. 기본 에이전트</text>
    <text x="510" y="432" class="h">임시 툴 호출</text>
    <text x="510" y="474" class="body">도구 이름</text>
    <text x="510" y="508" class="body">인자</text>
    <text x="510" y="536" class="small">아직 실행하지 않음</text>
  </g>

  <path d="M758 436 H858" class="flow"/>

  <g>
    <rect x="858" y="296" width="338" height="280" rx="28" fill="#f0f9ff" stroke="#93c5fd" stroke-width="3"/>
    <text x="1027" y="356" text-anchor="middle" class="h">3. 리뷰어 게이트</text>
    <text x="918" y="418" class="body">툴 선택이 맞는가</text>
    <text x="918" y="454" class="body">인자가 안전한가</text>
    <text x="918" y="490" class="body">도구가 필요 없는 요청인가</text>
    <text x="918" y="526" class="body">정책·상태 제약을 지키는가</text>
  </g>

  <path d="M1196 436 H1294" class="flow"/>

  <g>
    <rect x="1294" y="350" width="240" height="172" rx="24" class="card"/>
    <rect x="1336" y="396" width="156" height="50" rx="25" fill="#059669"/>
    <text x="1414" y="430" text-anchor="middle" class="white">실행 승인</text>
    <text x="1344" y="486" class="body">승인된 호출</text>
    <text x="1344" y="518" class="small">외부 도구 호출</text>
  </g>

  <path d="M1014 576 C1014 684 608 690 608 558" class="return"/>
  <text x="782" y="718" text-anchor="middle" class="muted" font-size="25" font-weight="900" fill="#2563eb">수정 요청: 실행 전에 다시 호출을 만들게 한다</text>

  <rect x="168" y="650" width="282" height="84" rx="22" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="309" y="685" text-anchor="middle" class="pillText">왜 중요한가</text>
  <text x="309" y="720" text-anchor="middle" class="small">잘못된 상태 변경을 사전에 차단</text>

  <rect x="1128" y="650" width="326" height="84" rx="22" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
  <text x="1291" y="685" text-anchor="middle" class="pillText">측정해야 할 부작용</text>
  <text x="1291" y="720" text-anchor="middle" class="small">맞는 호출을 리뷰어가 깨뜨릴 수 있음</text>

  <rect x="492" y="760" width="604" height="56" rx="18" fill="#ecfeff" stroke="#a5f3fc" stroke-width="2"/>
  <text x="794" y="796" text-anchor="middle" class="pillText">평가 축: 도움성 · 유해성 · 이득/위험 비율 · 지연 비용</text>
</svg>
