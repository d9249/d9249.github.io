<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Reinforced Agent 실행 전 리뷰 게이트</title>
  <desc id="desc">사용자 요청, 기본 에이전트, 리뷰어 게이트, 실행 승인으로 이어지는 툴 호출 검토 흐름도.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L11,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      text{font-family:"Apple SD Gothic Neo","Noto Sans CJK KR","Pretendard",system-ui,sans-serif}
      .bg{fill:#f7fafc}
      .panel{fill:#fff;stroke:#d9e3ef;stroke-width:2}
      .kicker{font-size:22px;font-weight:800;fill:#2563eb}
      .title{font-size:50px;font-weight:900;fill:#111827}
      .sub{font-size:25px;font-weight:600;fill:#52627a}
      .card{fill:#fff;stroke:#d9e3ef;stroke-width:2}
      .review{fill:#eef8ff;stroke:#93c5fd;stroke-width:3}
      .h{font-size:31px;font-weight:900;fill:#111827}
      .body{font-size:23px;font-weight:650;fill:#475569}
      .num{font-size:23px;font-weight:900;fill:#fff}
      .pill{font-size:22px;font-weight:850;fill:#172033}
      .line{stroke:#334155;stroke-width:4;stroke-linecap:round;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect x="64" y="52" width="1472" height="792" rx="34" class="panel"/>

  <text x="104" y="112" class="kicker">실행 전 검토</text>
  <text x="104" y="174" class="title">툴 호출은 실행 전에 리뷰어 게이트를 통과한다</text>
  <text x="104" y="222" class="sub">외부 상태를 바꾸기 전에, 임시 호출을 별도 리뷰어가 먼저 점검한다.</text>

  <rect x="108" y="344" width="250" height="210" rx="24" class="card"/>
  <circle cx="158" cy="400" r="28" fill="#64748b"/><text x="158" y="408" text-anchor="middle" class="num">1</text>
  <text x="198" y="408" class="h">요청</text>
  <text x="146" y="468" class="body">작업 + 맥락</text>
  <text x="146" y="502" class="body">상태 변경 가능</text>

  <path d="M378 449 H456" class="line"/>

  <rect x="476" y="344" width="288" height="210" rx="24" class="card"/>
  <circle cx="526" cy="400" r="28" fill="#2563eb"/><text x="526" y="408" text-anchor="middle" class="num">2</text>
  <text x="566" y="408" class="h">기본 에이전트</text>
  <text x="514" y="468" class="body">임시 툴 호출</text>
  <text x="514" y="502" class="body">아직 실행 안 함</text>

  <path d="M784 449 H862" class="line"/>

  <rect x="882" y="314" width="336" height="270" rx="28" class="review"/>
  <circle cx="932" cy="374" r="28" fill="#0f766e"/><text x="932" y="382" text-anchor="middle" class="num">3</text>
  <text x="972" y="382" class="h">리뷰어 게이트</text>
  <text x="932" y="448" class="body">툴 선택</text>
  <text x="932" y="482" class="body">인자 안전성</text>
  <text x="932" y="516" class="body">정책 · 상태 제약</text>

  <path d="M1238 449 H1280" class="line"/>

  <rect x="1300" y="344" width="226" height="210" rx="24" class="card"/>
  <rect x="1340" y="390" width="148" height="48" rx="24" fill="#059669"/>
  <text x="1414" y="421" text-anchor="middle" fill="#fff" font-size="24" font-weight="900">승인</text>
  <text x="1342" y="486" class="body">실제 도구 호출</text>
  <text x="1342" y="520" class="body">결과 반환</text>

  <rect x="384" y="642" width="832" height="72" rx="24" fill="#f8fbff" stroke="#d9e3ef" stroke-width="2"/>
  <text x="800" y="686" text-anchor="middle" class="pill">리뷰 결과: 승인 또는 수정 요청</text>

  <rect x="244" y="756" width="410" height="68" rx="22" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="449" y="799" text-anchor="middle" class="pill">도움성: 잘못된 호출을 고침</text>

  <rect x="946" y="756" width="410" height="68" rx="22" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
  <text x="1151" y="799" text-anchor="middle" class="pill">유해성: 맞는 호출을 깨뜨림</text>

</svg>
