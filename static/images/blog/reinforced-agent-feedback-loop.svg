<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Reinforced Agent inference-time feedback loop</title>
  <desc id="desc">A simplified diagram showing a user request flowing to a tool-calling agent, provisional tool call review, feedback loop, and final tool execution.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="1200" height="620" rx="32" fill="url(#bg)"/>
  <text x="80" y="78" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Inference-Time Feedback for Tool-Calling Agents</text>
  <text x="80" y="112" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Execute only after the provisional tool call passes a separate reviewer.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="235" width="190" height="118" rx="22" fill="#ffffff" stroke="#dbe4f0"/>
    <text x="165" y="281" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">User request</text>
    <text x="165" y="312" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">task + context</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="345" y="215" width="220" height="158" rx="24" fill="#ffffff" stroke="#c7d2fe"/>
    <rect x="345" y="215" width="220" height="46" rx="24" fill="url(#blue)"/>
    <path d="M345 239 Q345 215 369 215 H541 Q565 215 565 239 V261 H345 Z" fill="url(#blue)"/>
    <text x="455" y="246" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">Base agent</text>
    <text x="455" y="297" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Provisional</text>
    <text x="455" y="323" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">tool call</text>
    <text x="455" y="349" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">not executed yet</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="650" y="205" width="250" height="178" rx="24" fill="#ffffff" stroke="#bae6fd"/>
    <text x="775" y="251" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">Reviewer agent</text>
    <text x="775" y="282" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">checks tool choice, args,</text>
    <text x="775" y="305" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">irrelevance, policy/state</text>
    <rect x="688" y="326" width="174" height="34" rx="17" fill="#e0f2fe"/>
    <text x="775" y="349" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#0369a1">Helpfulness vs Harmfulness</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="985" y="235" width="155" height="118" rx="22" fill="#ffffff" stroke="#bbf7d0"/>
    <rect x="1010" y="263" width="105" height="34" rx="17" fill="url(#green)"/>
    <text x="1062" y="286" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#ffffff">Execute</text>
    <text x="1062" y="323" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">approved call</text>
  </g>

  <path d="M260 294 H330" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M565 294 H635" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M900 294 H970" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M775 383 C775 475 500 475 500 382" fill="none" stroke="#2563eb" stroke-width="3.5" stroke-dasharray="10 8" marker-end="url(#arrowBlue)"/>
  <text x="640" y="505" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#2563eb">feedback loop: revise before execution</text>

  <g transform="translate(105,455)">
    <rect x="0" y="0" width="240" height="64" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="120" y="27" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#9a3412">Why this matters</text>
    <text x="120" y="49" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#9a3412">prevents destructive state changes</text>
  </g>

  <g transform="translate(855,455)">
    <rect x="0" y="0" width="240" height="64" rx="18" fill="#fef2f2" stroke="#fecaca"/>
    <text x="120" y="27" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#991b1b">Trade-off</text>
    <text x="120" y="49" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#991b1b">reviewer can also break valid calls</text>
  </g>
</svg>
