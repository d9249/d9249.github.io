<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Google DeepMind Science Skills workbench architecture</title>
  <desc id="desc">A diagram showing Antigravity agent harness, Science Skills, scientific data tools, and verifiable artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.52" stop-color="#10243b"/>
      <stop offset="1" stop-color="#172e25"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12233a"/>
      <stop offset="1" stop-color="#0d1a2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#86efac"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title{font:700 46px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}
      .subtitle{font:400 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#b6c6d9}
      .small{font:500 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#cbd5e1}
      .tiny{font:500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#93a4b8}
      .label{font:800 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}
      .num{font:800 36px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#e0f2fe}
      .arrow{stroke:#7dd3fc;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none;opacity:.9}
      .dash{stroke:#86efac;stroke-width:4;stroke-dasharray:9 10;fill:none;opacity:.82}
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1290" cy="110" r="260" fill="#22c55e" opacity="0.06"/>
  <circle cx="260" cy="760" r="280" fill="#38bdf8" opacity="0.08"/>

  <text x="80" y="94" class="title">Science Skills turns Antigravity into a scientific workbench</text>
  <text x="82" y="134" class="subtitle">A skill bundle is not just a prompt pack: it packages instructions, scripts, data-source routes, and verification artifacts.</text>

  <rect x="82" y="184" width="310" height="565" rx="28" fill="url(#card)" stroke="#31445f" filter="url(#shadow)"/>
  <text x="118" y="235" class="label">1. Antigravity harness</text>
  <text x="118" y="280" class="small">• planner / editor / terminal</text>
  <text x="118" y="314" class="small">• browser and artifacts</text>
  <text x="118" y="348" class="small">• Gemini 3 Flash / 3.1 Pro</text>
  <rect x="118" y="405" width="238" height="170" rx="22" fill="#081827" stroke="#2c5f7a"/>
  <text x="150" y="464" class="num">67</text>
  <text x="150" y="500" class="small">expert capability tasks</text>
  <text x="150" y="535" class="tiny">binary success criteria</text>
  <text x="118" y="640" class="tiny">Agent output is graded as scientific evidence work.</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M406 466 C455 466 471 466 520 466"/>

  <rect x="530" y="184" width="410" height="565" rx="28" fill="url(#card)" stroke="#31445f" filter="url(#shadow)"/>
  <text x="566" y="235" class="label">2. Science Skills bundle</text>
  <text x="566" y="282" class="small">• 37 SKILL.md packages</text>
  <text x="566" y="316" class="small">• 63 Python helper scripts</text>
  <text x="566" y="350" class="small">• 100+ Markdown/reference files</text>
  <rect x="566" y="395" width="338" height="76" rx="18" fill="#0b2238" stroke="#38bdf8"/>
  <text x="592" y="428" class="small">progressive disclosure</text>
  <text x="592" y="456" class="tiny">metadata first, full protocol only when relevant</text>
  <rect x="566" y="498" width="338" height="76" rx="18" fill="#10271d" stroke="#86efac"/>
  <text x="592" y="531" class="small">domain wrappers</text>
  <text x="592" y="559" class="tiny">rate limits, IDs, API quirks, output formats</text>
  <rect x="566" y="601" width="338" height="76" rx="18" fill="#221b35" stroke="#c084fc"/>
  <text x="592" y="634" class="small">workflow skill creator</text>
  <text x="592" y="662" class="tiny">turn completed scientific workflows into skills</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M955 466 C1000 466 1020 466 1066 466"/>

  <rect x="1076" y="184" width="442" height="565" rx="28" fill="url(#card)" stroke="#31445f" filter="url(#shadow)"/>
  <text x="1112" y="235" class="label">3. Scientific resources</text>
  <text x="1112" y="282" class="small">Genomics: AlphaGenome, ClinVar, gnomAD</text>
  <text x="1112" y="316" class="small">Protein: AFDB, UniProt, PDB, Foldseek</text>
  <text x="1112" y="350" class="small">Chemistry: ChEMBL, PubChem, openFDA</text>
  <text x="1112" y="384" class="small">Evidence: PubMed, EuropePMC, OpenAlex</text>
  <text x="1112" y="418" class="small">Ontology: QuickGO, Reactome, EMBL-EBI OLS</text>
  <rect x="1112" y="475" width="342" height="150" rx="22" fill="#071b15" stroke="#22c55e"/>
  <text x="1144" y="532" class="num">30+</text>
  <text x="1144" y="568" class="small">major life-science databases/tools</text>
  <text x="1144" y="604" class="tiny">curated routes instead of generic web search</text>

  <path class="dash" d="M1288 750 C1288 812 1140 820 950 806 C738 790 510 785 270 752"/>
  <text x="620" y="832" class="small" fill="#dcfce7">Verifiable artifacts: grounded summaries · citations · coordinates · IDs · scripts · rendered figures</text>
  <rect x="80" y="790" width="1440" height="4" rx="2" fill="url(#accent)" opacity=".75"/>
</svg>