<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">NVIDIA AI-Q 스킬 책임 경계</title>
  <desc id="desc">범용 하네스, 스킬 어댑터, AI-Q 서버, 데이터 경계가 맡는 책임을 네 개의 동일한 패널로 나눈 구조도.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L11,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      text{font-family:"Apple SD Gothic Neo","Noto Sans CJK KR","Pretendard",system-ui,sans-serif}
      .bg{fill:#f7fafc}
      .panel{fill:#fff;stroke:#d9e3ef;stroke-width:2}
      .kicker{font-size:22px;font-weight:800;fill:#2563eb}
      .title{font-size:50px;font-weight:900;fill:#111827}
      .sub{font-size:25px;font-weight:600;fill:#52627a}
      .card{fill:#fff;stroke-width:3}
      .h{font-size:31px;font-weight:900;fill:#111827}
      .body{font-size:23px;font-weight:650;fill:#475569}
      .tag{font-size:21px;font-weight:850;fill:#172033}
      .footer{font-size:22px;font-weight:750;fill:#e5edf7}
      .line{stroke:#64748b;stroke-width:4;stroke-linecap:round;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect x="64" y="52" width="1472" height="792" rx="34" class="panel"/>

  <text x="104" y="112" class="kicker">책임 경계</text>
  <text x="104" y="174" class="title">딥리서치를 하네스 밖 전문 스킬로 분리한다</text>
  <text x="104" y="222" class="sub">하네스는 조율하고, AI-Q는 리서치 런타임과 데이터 접근을 맡는다.</text>

  <rect x="104" y="310" width="310" height="430" rx="26" class="card" stroke="#93c5fd"/>
  <text x="140" y="370" class="h">범용 하네스</text>
  <text x="140" y="424" class="body">사용자 의도</text>
  <text x="140" y="460" class="body">세션 맥락</text>
  <text x="140" y="496" class="body">결과 반영</text>
  <rect x="140" y="642" width="238" height="48" rx="24" fill="#dbeafe"/>
  <text x="259" y="673" text-anchor="middle" class="tag">작업 조율</text>

  <path d="M424 525 H492" class="line"/>

  <rect x="512" y="310" width="310" height="430" rx="26" class="card" stroke="#22d3ee"/>
  <text x="548" y="370" class="h">스킬 어댑터</text>
  <text x="548" y="424" class="body">SKILL.md</text>
  <text x="548" y="460" class="body">도움 스크립트</text>
  <text x="548" y="496" class="body">상태 확인</text>
  <rect x="548" y="642" width="238" height="48" rx="24" fill="#cffafe"/>
  <text x="667" y="673" text-anchor="middle" class="tag">API 호출</text>

  <path d="M832 525 H900" class="line"/>

  <rect x="920" y="310" width="310" height="430" rx="26" class="card" stroke="#34d399"/>
  <text x="956" y="370" class="h">AI-Q 서버</text>
  <text x="956" y="424" class="body">의도 분류</text>
  <text x="956" y="460" class="body">얕은/심층 리서치</text>
  <text x="956" y="496" class="body">인용 검증</text>
  <rect x="956" y="642" width="238" height="48" rx="24" fill="#dcfce7"/>
  <text x="1075" y="673" text-anchor="middle" class="tag">리서치 런타임</text>

  <path d="M1240 525 H1288" class="line"/>

  <rect x="1308" y="310" width="216" height="430" rx="26" class="card" stroke="#f59e0b"/>
  <text x="1340" y="370" class="h">데이터 경계</text>
  <text x="1340" y="424" class="body">MCP</text>
  <text x="1340" y="460" class="body">문서 · DB</text>
  <text x="1340" y="496" class="body">인증 토큰</text>
  <rect x="1340" y="642" width="176" height="48" rx="24" fill="#fef3c7"/>
  <text x="1428" y="673" text-anchor="middle" class="tag">신뢰 경계</text>

  <rect x="156" y="778" width="1288" height="58" rx="20" fill="#172033"/>
  <text x="800" y="815" text-anchor="middle" class="footer">원천 데이터 접근은 AI-Q 배포 환경 안에 두고, 하네스는 인용된 결과만 받는다.</text>
</svg>
