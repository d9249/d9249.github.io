<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Agent Self-Evolution 스킬 진화 루프</title>
  <desc id="desc">대상 선택, 평가 데이터, 최적화, 검증, 리뷰 산출물이 순서대로 이어지고 하단의 제약 게이트를 통과하는 스킬 진화 구조도.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L11,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      text{font-family:"Apple SD Gothic Neo","Noto Sans CJK KR","Pretendard",system-ui,sans-serif}
      .bg{fill:#f7fafc}
      .panel{fill:#fff;stroke:#d9e3ef;stroke-width:2}
      .kicker{font-size:22px;font-weight:800;fill:#0f766e}
      .title{font-size:50px;font-weight:900;fill:#111827}
      .sub{font-size:25px;font-weight:600;fill:#52627a}
      .card{fill:#fff;stroke:#d9e3ef;stroke-width:2}
      .h{font-size:28px;font-weight:900;fill:#111827}
      .body{font-size:22px;font-weight:650;fill:#52627a}
      .num{font-size:23px;font-weight:900;fill:#fff}
      .metric{font-size:50px;font-weight:900;fill:#0f766e}
      .chip{font-size:21px;font-weight:850;fill:#172033}
      .line{stroke:#64748b;stroke-width:4;stroke-linecap:round;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect x="64" y="52" width="1472" height="792" rx="34" class="panel"/>

  <text x="104" y="112" class="kicker">스킬 진화 루프</text>
  <text x="104" y="174" class="title">스킬 문서를 실험 단위로 바꾼다</text>
  <text x="104" y="222" class="sub">문서를 고치기 전에 기준안, 진화 후보, 검증 지표를 나란히 둔다.</text>

  <rect x="1208" y="92" width="284" height="128" rx="24" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
  <text x="1350" y="154" text-anchor="middle" class="metric">+20.7%</text>
  <text x="1350" y="198" text-anchor="middle" class="body">작은 1단계 검증</text>

  <g transform="translate(104 322)">
    <rect x="0" y="0" width="240" height="210" rx="24" class="card"/>
    <circle cx="54" cy="58" r="28" fill="#2563eb"/><text x="54" y="66" text-anchor="middle" class="num">1</text>
    <text x="92" y="66" class="h">대상 선택</text>
    <text x="42" y="126" class="body">SKILL.md</text>
    <text x="42" y="160" class="body">도구 설명</text>
  </g>
  <path d="M364 427 H442" class="line"/>

  <g transform="translate(462 322)">
    <rect x="0" y="0" width="240" height="210" rx="24" class="card"/>
    <circle cx="54" cy="58" r="28" fill="#0891b2"/><text x="54" y="66" text-anchor="middle" class="num">2</text>
    <text x="92" y="66" class="h">평가 데이터</text>
    <text x="42" y="126" class="body">합성 케이스</text>
    <text x="42" y="160" class="body">정답 세트</text>
  </g>
  <path d="M722 427 H800" class="line"/>

  <g transform="translate(820 322)">
    <rect x="0" y="0" width="240" height="210" rx="24" fill="#f5f0ff" stroke="#c4b5fd" stroke-width="2"/>
    <circle cx="54" cy="58" r="28" fill="#7c3aed"/><text x="54" y="66" text-anchor="middle" class="num">3</text>
    <text x="92" y="66" class="h">최적화</text>
    <text x="42" y="126" class="body">DSPy + GEPA</text>
    <text x="42" y="160" class="body">표적 변이</text>
  </g>
  <path d="M1080 427 H1158" class="line"/>

  <g transform="translate(1178 322)">
    <rect x="0" y="0" width="240" height="210" rx="24" class="card"/>
    <circle cx="54" cy="58" r="28" fill="#0f766e"/><text x="54" y="66" text-anchor="middle" class="num">4</text>
    <text x="92" y="66" class="h">검증</text>
    <text x="42" y="126" class="body">기준안 비교</text>
    <text x="42" y="160" class="body">점수 · 비용</text>
  </g>

  <rect x="404" y="606" width="792" height="74" rx="22" fill="#172033"/>
  <text x="800" y="653" text-anchor="middle" fill="#e5edf7" font-size="25" font-weight="850">제약 게이트: 크기 제한 · 성장률 20% · 테스트 · 비밀값 필터링</text>

  <rect x="514" y="724" width="572" height="74" rx="22" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="800" y="770" text-anchor="middle" class="chip">리뷰 산출물: 차이 · 지표 · 회귀 테스트 · 사람 리뷰</text>

</svg>
