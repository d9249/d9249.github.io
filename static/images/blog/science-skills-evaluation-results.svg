<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Science Skills evaluation results</title>
  <desc id="desc">Reliability, token efficiency, and BioReason results for Science Skills in Antigravity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111e"/><stop offset="1" stop-color="#132a37"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#4ade80"/><stop offset="1" stop-color="#14b8a6"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#f472b6"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000" flood-opacity="0.32"/></filter>
    <style>
      .title{font:800 54px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}
      .subtitle{font:400 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#bdd0e4}
      .head{font:800 30px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}
      .label{font:600 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#dbeafe}
      .tiny{font:500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#93a4b8}
      .value{font:800 26px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}
      .axis{stroke:#334155;stroke-width:2}
      .grid{stroke:#233246;stroke-width:1;opacity:.7}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1360" cy="122" r="250" fill="#38bdf8" opacity="0.06"/>
  <circle cx="230" cy="830" r="270" fill="#22c55e" opacity="0.07"/>
  <text x="80" y="92" class="title">What changes when Science Skills are added?</text>
  <text x="82" y="132" class="subtitle">Official report results: more science tasks finish, fewer tokens are spent, and variant reasoning improves.</text>

  <rect x="78" y="184" width="472" height="585" rx="28" fill="#0d1b2e" stroke="#304059" filter="url(#shadow)"/>
  <text x="114" y="238" class="head">Reliability on 67 tasks</text>
  <text x="114" y="270" class="tiny">binary success on expert-validated scientific tasks</text>
  <line x1="160" y1="690" x2="500" y2="690" class="axis"/>
  <line x1="160" y1="330" x2="160" y2="690" class="axis"/>
  <line x1="160" y1="510" x2="500" y2="510" class="grid"/>
  <text x="116" y="696" class="tiny">0%</text><text x="106" y="516" class="tiny">50%</text><text x="98" y="336" class="tiny">100%</text>
  <rect x="196" y="514" width="54" height="176" rx="10" fill="#334155"/><text x="192" y="742" class="tiny">Flash</text><text x="190" y="494" class="value">49%</text>
  <rect x="260" y="355" width="54" height="335" rx="10" fill="url(#green)"/><text x="258" y="742" class="tiny">+Skills</text><text x="252" y="337" class="value">93%</text>
  <rect x="372" y="449" width="54" height="241" rx="10" fill="#334155"/><text x="374" y="742" class="tiny">Pro</text><text x="365" y="431" class="value">67%</text>
  <rect x="436" y="362" width="54" height="328" rx="10" fill="url(#green)"/><text x="432" y="742" class="tiny">+Skills</text><text x="428" y="344" class="value">91%</text>

  <rect x="594" y="184" width="442" height="585" rx="28" fill="#0d1b2e" stroke="#304059" filter="url(#shadow)"/>
  <text x="630" y="238" class="head">Mean token usage</text>
  <text x="630" y="270" class="tiny">average tokens per task, lower is better</text>
  <text x="630" y="342" class="label">Gemini 3 Flash</text>
  <rect x="630" y="370" width="320" height="38" rx="19" fill="#334155"/><rect x="630" y="370" width="320" height="38" rx="19" fill="url(#blue)" opacity=".55"/>
  <text x="963" y="397" class="value">13,952</text>
  <rect x="630" y="428" width="157" height="38" rx="19" fill="url(#green)"/>
  <text x="804" y="455" class="value">6,827</text>
  <text x="630" y="492" class="label">2.04× efficiency gain</text>
  <text x="630" y="568" class="label">Gemini 3.1 Pro</text>
  <rect x="630" y="596" width="320" height="38" rx="19" fill="#334155"/><rect x="630" y="596" width="320" height="38" rx="19" fill="url(#blue)" opacity=".55"/>
  <text x="963" y="623" class="value">5,828</text>
  <rect x="630" y="654" width="197" height="38" rx="19" fill="url(#green)"/>
  <text x="846" y="681" class="value">3,588</text>
  <text x="630" y="726" class="label">1.62× efficiency gain</text>

  <rect x="1080" y="184" width="442" height="585" rx="28" fill="#0d1b2e" stroke="#304059" filter="url(#shadow)"/>
  <text x="1116" y="238" class="head">BioReason variant reasoning</text>
  <text x="1116" y="270" class="tiny">Gemini 3 Flash on VEP subsets</text>
  <text x="1116" y="342" class="label">VEP-Coding, n=1,233</text>
  <rect x="1116" y="370" width="157" height="42" rx="21" fill="#334155"/><text x="1290" y="399" class="value">41.4%</text>
  <rect x="1116" y="432" width="231" height="42" rx="21" fill="url(#violet)"/><text x="1362" y="461" class="value">60.9%</text>
  <text x="1116" y="520" class="label">VEP-Non-SNV, n=873</text>
  <rect x="1116" y="548" width="177" height="42" rx="21" fill="#334155"/><text x="1310" y="577" class="value">46.6%</text>
  <rect x="1116" y="610" width="310" height="42" rx="21" fill="url(#violet)"/><text x="1442" y="639" class="value">81.6%</text>
  <text x="1116" y="718" class="tiny">Gray = without Science Skills · Color = with Science Skills</text>
</svg>