<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw Gateway Architecture</title>
  <desc id="desc">Messaging channels and clients connect to a local OpenClaw Gateway, which routes agent sessions to tools, skills, cron jobs, browser automation, and companion nodes.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.7"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="gateway" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#155e75" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/>
    </marker>
    <style>
      .title { font: 700 32px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #f8fafc; }
      .subtitle { font: 500 15px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #94a3b8; }
      .label { font: 700 18px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #f8fafc; }
      .small { font: 500 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #cbd5e1; }
      .tiny { font: 500 10px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #94a3b8; }
      .box { rx: 18; stroke-width: 2; }
      .external { fill: rgba(30,41,59,.78); stroke: #94a3b8; }
      .frontend { fill: rgba(8,51,68,.75); stroke: #22d3ee; }
      .backend { fill: rgba(6,78,59,.78); stroke: #34d399; }
      .security { fill: rgba(136,19,55,.62); stroke: #fb7185; }
      .db { fill: rgba(76,29,149,.65); stroke: #a78bfa; }
      .cloud { fill: rgba(120,53,15,.55); stroke: #fbbf24; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrow); }
      .arrowC { fill: none; stroke: #22d3ee; stroke-width: 2.5; marker-end: url(#arrow-cyan); }
      .arrowE { fill: none; stroke: #34d399; stroke-width: 2.5; marker-end: url(#arrow-emerald); }
      .arrowR { fill: none; stroke: #fb7185; stroke-width: 2.5; stroke-dasharray: 7 6; marker-end: url(#arrow-rose); }
      .pill { fill: #0f172a; stroke: #334155; stroke-width: 1; rx: 11; }
    </style>
  </defs>
  <rect width="1400" height="760" fill="url(#bg)"/>
  <rect width="1400" height="760" fill="url(#grid)" opacity="0.62"/>
  <circle cx="1190" cy="74" r="170" fill="#22d3ee" opacity="0.08"/>
  <circle cx="154" cy="650" r="190" fill="#fb7185" opacity="0.07"/>

  <text x="60" y="66" class="title">OpenClaw: local-first AI gateway</text>
  <text x="60" y="96" class="subtitle">Chat surfaces, tools, skills, cron jobs, and companion devices are coordinated by one Gateway.</text>

  <path class="arrowC" d="M 330 250 C 430 250, 500 300, 570 335"/>
  <path class="arrowC" d="M 330 392 C 430 392, 500 365, 570 365"/>
  <path class="arrowC" d="M 330 535 C 445 535, 500 430, 575 395"/>

  <path class="arrowE" d="M 825 345 C 890 315, 930 255, 1000 225"/>
  <path class="arrowE" d="M 830 365 C 910 370, 940 368, 1000 365"/>
  <path class="arrowE" d="M 825 395 C 900 430, 930 510, 1000 535"/>
  <path class="arrowR" d="M 700 470 C 700 520, 700 560, 700 600"/>

  <rect x="70" y="170" width="260" height="128" class="box external"/>
  <text x="100" y="210" class="label">Messaging channels</text>
  <text x="100" y="238" class="small">Telegram · WhatsApp · Slack</text>
  <text x="100" y="262" class="small">Discord · Signal · iMessage</text>
  <text x="100" y="286" class="tiny">DM pairing / allowlists / group policy</text>

  <rect x="70" y="330" width="260" height="115" class="box frontend"/>
  <text x="100" y="369" class="label">Control clients</text>
  <text x="100" y="397" class="small">CLI · Dashboard · macOS app</text>
  <text x="100" y="421" class="tiny">status, sessions, config, delivery</text>

  <rect x="70" y="485" width="260" height="115" class="box external"/>
  <text x="100" y="524" class="label">External triggers</text>
  <text x="100" y="552" class="small">cron · webhooks · native commands</text>
  <text x="100" y="576" class="tiny">background tasks and reminders</text>

  <rect x="515" y="225" width="370" height="245" rx="26" fill="#07111f" stroke="#0f172a" stroke-width="8" opacity="0.9"/>
  <rect x="525" y="235" width="350" height="225" rx="24" fill="url(#gateway)" stroke="#34d399" stroke-width="2.5" filter="url(#glow)"/>
  <text x="596" y="284" class="title" style="font-size:30px">Gateway</text>
  <text x="585" y="316" class="small">local daemon · WebSocket · HTTP UI</text>
  <rect x="565" y="345" width="270" height="34" class="pill"/>
  <text x="589" y="367" class="small">agent sessions + routing</text>
  <rect x="565" y="390" width="270" height="34" class="pill"/>
  <text x="596" y="412" class="small">auth, pairing, policies</text>
  <text x="574" y="445" class="tiny">default port: 127.0.0.1:18789</text>

  <rect x="1000" y="165" width="320" height="118" class="box backend"/>
  <text x="1030" y="204" class="label">Tools + plugins</text>
  <text x="1030" y="232" class="small">exec · browser · web · message</text>
  <text x="1030" y="256" class="tiny">extend with plugin capabilities</text>

  <rect x="1000" y="315" width="320" height="118" class="box db"/>
  <text x="1030" y="354" class="label">Skills + memory</text>
  <text x="1030" y="382" class="small">SKILL.md workflows, context files</text>
  <text x="1030" y="406" class="tiny">workspace / managed / bundled skills</text>

  <rect x="1000" y="485" width="320" height="128" class="box cloud"/>
  <text x="1030" y="524" class="label">Companion nodes</text>
  <text x="1030" y="552" class="small">macOS · iOS · Android · headless</text>
  <text x="1030" y="576" class="tiny">canvas, camera, screen, voice, system.run</text>

  <rect x="520" y="605" width="360" height="82" class="box security"/>
  <text x="555" y="638" class="label">Security posture</text>
  <text x="555" y="665" class="small">one trusted operator boundary + sandbox options</text>

  <rect x="60" y="705" width="1280" height="1" fill="#334155" opacity="0.8"/>
  <text x="60" y="732" class="tiny">Source: OpenClaw README/docs. Diagram summarizes the Gateway model rather than every supported channel or tool.</text>
</svg>
