<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">GBrain architecture overview</title>
  <desc id="desc">Markdown brain repos are synced into a PGLite or Postgres vector database, served through CLI, MCP and skills to coding agents and team clients.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="55%" stop-color="#10152d"/>
      <stop offset="100%" stop-color="#1b1231"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16233b"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="55%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 800 48px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 20px Inter, ui-sans-serif, system-ui, sans-serif; fill: #cbd5e1; }
      .label { font: 800 25px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f8fafc; }
      .body { font: 500 18px Inter, ui-sans-serif, system-ui, sans-serif; fill: #cbd5e1; }
      .tiny { font: 700 15px Inter, ui-sans-serif, system-ui, sans-serif; fill: #93c5fd; letter-spacing: .06em; }
      .card { fill: url(#card); stroke: rgba(148,163,184,.35); stroke-width: 1.2; filter: url(#shadow); }
      .pill { fill: rgba(15,23,42,.72); stroke: rgba(125,211,252,.28); stroke-width: 1; }
      .line { stroke: url(#accent); stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: .95; }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 9 10; opacity: .8; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="120" r="260" fill="#7c3aed" opacity="0.14"/>
  <circle cx="190" cy="590" r="260" fill="#0284c7" opacity="0.13"/>

  <text x="72" y="82" class="title">GBrain</text>
  <text x="72" y="118" class="subtitle">Markdown source-of-truth + hybrid retrieval + MCP memory layer for agents</text>

  <rect x="72" y="176" rx="26" ry="26" width="260" height="310" class="card"/>
  <text x="104" y="226" class="tiny">SOURCE OF TRUTH</text>
  <text x="104" y="266" class="label">Brain repos</text>
  <text x="104" y="306" class="body">people/</text>
  <text x="104" y="336" class="body">companies/</text>
  <text x="104" y="366" class="body">meetings/</text>
  <text x="104" y="396" class="body">concepts/</text>
  <rect x="104" y="424" rx="14" ry="14" width="190" height="34" class="pill"/>
  <text x="122" y="447" class="body">Git + Markdown</text>

  <rect x="508" y="142" rx="30" ry="30" width="282" height="378" class="card"/>
  <text x="544" y="195" class="tiny">GBRAIN ENGINE</text>
  <text x="544" y="236" class="label">Sync + index</text>
  <text x="544" y="279" class="body">• PGLite local brain</text>
  <text x="544" y="311" class="body">• Postgres / pgvector</text>
  <text x="544" y="343" class="body">• BM25 + vectors + RRF</text>
  <text x="544" y="375" class="body">• Sources and brains</text>
  <text x="544" y="407" class="body">• Jobs and enrichment</text>
  <rect x="544" y="444" rx="14" ry="14" width="204" height="38" class="pill"/>
  <text x="564" y="469" class="body">gbrain doctor</text>

  <rect x="954" y="176" rx="26" ry="26" width="254" height="310" class="card"/>
  <text x="988" y="226" class="tiny">AGENT SURFACE</text>
  <text x="988" y="266" class="label">Use the brain</text>
  <text x="988" y="306" class="body">Claude Code</text>
  <text x="988" y="336" class="body">Codex</text>
  <text x="988" y="366" class="body">Hermes / OpenClaw</text>
  <text x="988" y="396" class="body">HTTP MCP + OAuth</text>
  <rect x="988" y="424" rx="14" ry="14" width="172" height="34" class="pill"/>
  <text x="1006" y="447" class="body">skills + crons</text>

  <path d="M333 332 C397 332 433 332 502 332" class="line" marker-end="url(#arrow)"/>
  <path d="M790 332 C850 332 886 332 948 332" class="line" marker-end="url(#arrow)"/>
  <path d="M202 496 C265 608 430 626 586 548" class="dash"/>
  <path d="M706 548 C862 626 1028 608 1088 496" class="dash"/>

  <rect x="400" y="585" rx="22" ry="22" width="480" height="72" fill="rgba(15,23,42,.62)" stroke="rgba(148,163,184,.26)"/>
  <text x="432" y="630" class="subtitle">Caveat: the brain can store prompts, notes, citations and credentials-adjacent metadata. Scope sources, tokens and MCP access deliberately.</text>
</svg>
