<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">페이블 모드 세팅 가이드 판단 지도</title>
  <desc id="desc">Notion 가이드, Claude 프로젝트 지식, 결과 비교, 그리고 복사되는 것과 복사되지 않는 것을 구분한 다이어그램</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#93c5fd"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif; }
      .eyebrow { fill: #a5b4fc; font-size: 22px; font-weight: 700; letter-spacing: 0.08em; }
      .headline { fill: #f9fafb; font-size: 44px; font-weight: 800; }
      .sub { fill: #d1d5db; font-size: 22px; font-weight: 500; }
      .card-title { fill: #111827; font-size: 26px; font-weight: 800; }
      .card-body { fill: #374151; font-size: 18px; font-weight: 600; }
      .small { fill: #4b5563; font-size: 16px; font-weight: 600; }
      .pill-good { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; }
      .pill-warn { fill: #fff7ed; stroke: #f97316; stroke-width: 2; }
      .pill-text { font-size: 20px; font-weight: 800; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1030" cy="85" r="160" fill="#4f46e5" opacity="0.24"/>
  <circle cx="90" cy="560" r="170" fill="#0ea5e9" opacity="0.18"/>

  <text x="70" y="76" class="eyebrow">PROMPT WORKFLOW CHECK</text>
  <text x="70" y="130" class="headline">페이블 모드: 무엇을 빌려오고, 무엇은 못 빌려오나</text>
  <text x="70" y="170" class="sub">비공식 지침 번들을 모델 지능으로 착각하지 않기 위한 적용 지도</text>

  <g filter="url(#shadow)">
    <rect x="70" y="230" width="300" height="190" rx="28" fill="url(#card)"/>
    <text x="100" y="280" class="card-title">1. 공개 가이드</text>
    <text x="100" y="320" class="card-body">Notion 페이지와</text>
    <text x="100" y="348" class="card-body">비공식 prompt repo를</text>
    <text x="100" y="376" class="card-body">출처로 확인</text>
    <text x="100" y="402" class="small">그대로 복붙보다 범위 파악 먼저</text>

    <rect x="450" y="230" width="300" height="190" rx="28" fill="url(#card)"/>
    <text x="480" y="280" class="card-title">2. 격리된 프로젝트</text>
    <text x="480" y="320" class="card-body">Claude Projects 같은</text>
    <text x="480" y="348" class="card-body">분리 공간에만 적용</text>
    <text x="480" y="376" class="card-body">민감 업무와 분리</text>
    <text x="480" y="402" class="small">날짜·도구·환경 가정은 제거</text>

    <rect x="830" y="230" width="300" height="190" rx="28" fill="url(#card)"/>
    <text x="860" y="280" class="card-title">3. 결과로 검증</text>
    <text x="860" y="320" class="card-body">“지침 있니?”가 아니라</text>
    <text x="860" y="348" class="card-body">동일 과제의 산출물을</text>
    <text x="860" y="376" class="card-body">전후 비교</text>
    <text x="860" y="402" class="small">품질·비용·오류를 같이 본다</text>
  </g>

  <line x1="385" y1="325" x2="430" y2="325" stroke="#93c5fd" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="765" y1="325" x2="810" y2="325" stroke="#93c5fd" stroke-width="6" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="120" y="478" width="430" height="86" rx="28" class="pill-good"/>
    <text x="150" y="512" class="pill-text" fill="#047857">복사될 수 있는 것</text>
    <text x="150" y="542" class="card-body">답변 형식 · 검증 습관 · 작업 순서</text>

    <rect x="650" y="478" width="430" height="86" rx="28" class="pill-warn"/>
    <text x="680" y="512" class="pill-text" fill="#c2410c">복사되지 않는 것</text>
    <text x="680" y="542" class="card-body">모델 가중치 · 공식 보증 · 최신 정책</text>
  </g>
</svg>
