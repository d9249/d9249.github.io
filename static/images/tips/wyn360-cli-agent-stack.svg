<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">WYN360 CLI agent stack overview</title>
  <desc id="desc">A dark terminal-style overview diagram showing WYN360 CLI connecting providers, memory, skills, browser tools, cron agents, plugins, diagnostics, GitHub, and HuggingFace deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.45" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .muted { fill: #94a3b8; }
      .white { fill: #f8fafc; }
      .cyan { fill: #67e8f9; }
      .green { fill: #86efac; }
      .amber { fill: #fcd34d; }
      .pink { fill: #f0abfc; }
      .stroke { stroke: #334155; stroke-width: 2; }
      .line { stroke: #475569; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 8 12; }
      .pill { fill: #111827; stroke: #334155; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1360" cy="120" r="260" fill="#164e63" opacity="0.18"/>
  <circle cx="220" cy="760" r="300" fill="#4c1d95" opacity="0.16"/>

  <text x="96" y="104" class="sans white" font-size="56" font-weight="800">WYN360 CLI</text>
  <text x="98" y="150" class="sans muted" font-size="25">Python terminal agent with providers, tools, memory, skills, cron, plugins, and diagnostics</text>

  <g filter="url(#shadow)">
    <rect x="96" y="210" width="645" height="430" rx="28" fill="#020617" stroke="#334155" stroke-width="2"/>
    <rect x="96" y="210" width="645" height="54" rx="28" fill="#111827"/>
    <circle cx="132" cy="237" r="9" fill="#fb7185"/>
    <circle cx="162" cy="237" r="9" fill="#fbbf24"/>
    <circle cx="192" cy="237" r="9" fill="#34d399"/>
    <text x="226" y="246" class="mono muted" font-size="17">~/project — wyn360</text>

    <text x="132" y="314" class="mono green" font-size="25">$ pip install wyn360-cli</text>
    <text x="132" y="365" class="mono cyan" font-size="25">$ export CHOOSE_CLIENT=3</text>
    <text x="132" y="416" class="mono cyan" font-size="25">$ export GEMINI_API_KEY=••••••</text>
    <text x="132" y="494" class="mono white" font-size="28">You: build a Streamlit dashboard</text>
    <text x="132" y="546" class="mono amber" font-size="25">WYN360: plan → edit files → run tests</text>
    <text x="132" y="592" class="mono pink" font-size="22">⚠ command confirmation before shell execution</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="860" y="205" width="285" height="118" rx="22" fill="url(#card)" class="stroke"/>
    <text x="890" y="252" class="sans white" font-size="28" font-weight="700">Providers</text>
    <text x="890" y="288" class="sans muted" font-size="20">Claude · Bedrock</text>
    <text x="890" y="314" class="sans muted" font-size="20">Gemini · OpenAI</text>

    <rect x="1215" y="205" width="285" height="118" rx="22" fill="url(#card)" class="stroke"/>
    <text x="1245" y="252" class="sans white" font-size="28" font-weight="700">Tooling</text>
    <text x="1245" y="288" class="sans muted" font-size="20">files · git · shell</text>
    <text x="1245" y="314" class="sans muted" font-size="20">web · docs · browser</text>

    <rect x="860" y="386" width="285" height="118" rx="22" fill="url(#card)" class="stroke"/>
    <text x="890" y="433" class="sans white" font-size="28" font-weight="700">Agentic layer</text>
    <text x="890" y="469" class="sans muted" font-size="20">memory · skills</text>
    <text x="890" y="495" class="sans muted" font-size="20">plans · sub-agents</text>

    <rect x="1215" y="386" width="285" height="118" rx="22" fill="url(#card)" class="stroke"/>
    <text x="1245" y="433" class="sans white" font-size="28" font-weight="700">Automation</text>
    <text x="1245" y="469" class="sans muted" font-size="20">cron · plugins</text>
    <text x="1245" y="495" class="sans muted" font-size="20">LSP · rewind</text>

    <rect x="860" y="567" width="285" height="118" rx="22" fill="url(#card)" class="stroke"/>
    <text x="890" y="614" class="sans white" font-size="28" font-weight="700">Deploy paths</text>
    <text x="890" y="650" class="sans muted" font-size="20">GitHub PRs</text>
    <text x="890" y="676" class="sans muted" font-size="20">HuggingFace Spaces</text>

    <rect x="1215" y="567" width="285" height="118" rx="22" fill="url(#card)" class="stroke"/>
    <text x="1245" y="614" class="sans white" font-size="28" font-weight="700">Caveats</text>
    <text x="1245" y="650" class="sans muted" font-size="20">heavy deps</text>
    <text x="1245" y="676" class="sans muted" font-size="20">license metadata gap</text>
  </g>

  <path d="M742 425 C805 425 805 265 860 265" class="line" fill="none"/>
  <path d="M742 425 C812 425 812 445 860 445" class="line" fill="none"/>
  <path d="M742 425 C805 425 805 626 860 626" class="line" fill="none"/>
  <path d="M1145 265 C1180 265 1180 265 1215 265" class="line" fill="none"/>
  <path d="M1145 445 C1180 445 1180 445 1215 445" class="line" fill="none"/>
  <path d="M1145 626 C1180 626 1180 626 1215 626" class="line" fill="none"/>

  <g>
    <rect x="98" y="726" width="186" height="44" rx="22" class="pill"/>
    <text x="126" y="756" class="sans green" font-size="19" font-weight="700">PyPI 0.5.3</text>
    <rect x="310" y="726" width="235" height="44" rx="22" class="pill"/>
    <text x="338" y="756" class="sans cyan" font-size="19" font-weight="700">Python 3.10–3.14</text>
    <rect x="572" y="726" width="240" height="44" rx="22" class="pill"/>
    <text x="600" y="756" class="sans amber" font-size="19" font-weight="700">pydantic-ai stack</text>
    <rect x="840" y="726" width="295" height="44" rx="22" class="pill"/>
    <text x="868" y="756" class="sans pink" font-size="19" font-weight="700">~/.wyn360 local state</text>
  </g>

  <text x="98" y="832" class="mono muted" font-size="18">Source: PyPI wyn360-cli, github.com/yiqiao-yin/wyn360-cli, yiqiao-yin.github.io/wyn360-cli/</text>
</svg>
