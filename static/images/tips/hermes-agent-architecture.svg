<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Agent gateway-centered architecture</title>
  <desc id="desc">Hermes Agent connects messaging platforms, CLI, scheduled automation, tools, skills, memory, and model providers through a gateway and agent runtime.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#061d1b"/>
      <stop offset="55%" stop-color="#092b25"/>
      <stop offset="100%" stop-color="#0f382d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0%" stop-color="#f7e7b7"/>
      <stop offset="100%" stop-color="#c89f57"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: rgba(8,42,36,.86); stroke: rgba(247,231,183,.55); stroke-width: 2; rx: 28; filter: url(#soft); }
      .core { fill: rgba(247,231,183,.10); stroke: url(#gold); stroke-width: 3; rx: 34; filter: url(#soft); }
      .small { fill: rgba(6,29,27,.78); stroke: rgba(247,231,183,.45); stroke-width: 1.5; rx: 20; }
      .line { stroke: rgba(247,231,183,.42); stroke-width: 3; fill: none; stroke-linecap: round; }
      .arrow { fill: rgba(247,231,183,.58); }
      .title { font: 700 42px Georgia, 'Times New Roman', serif; fill: #f8e9bf; letter-spacing: 3px; }
      .subtitle { font: 500 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #cbbf9f; }
      .h { font: 700 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #f8e9bf; letter-spacing: .5px; }
      .t { font: 500 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #d7ccb0; }
      .chip { font: 700 16px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #092b25; }
      .chipbox { fill: #f5dfb3; rx: 14; }
      .muted { font: 500 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #a99f88; }
    </style>
  </defs>
  <rect class="bg" width="1400" height="800"/>
  <path d="M-60 710 C260 570 380 780 680 620 C970 470 1020 190 1460 120" stroke="rgba(248,233,191,.06)" stroke-width="130" fill="none"/>
  <text x="70" y="88" class="title">HERMES AGENT</text>
  <text x="72" y="126" class="subtitle">개인 AI 비서를 CLI · Gateway · Skills · Memory · Tools로 묶는 런타임</text>

  <rect x="500" y="230" width="400" height="310" class="core"/>
  <text x="700" y="295" text-anchor="middle" class="h">AIAgent Runtime</text>
  <text x="700" y="332" text-anchor="middle" class="t">tool-calling loop · sessions · checkpoints</text>
  <rect x="560" y="370" width="280" height="46" class="small"/>
  <text x="700" y="400" text-anchor="middle" class="t">Skills + Persistent Memory</text>
  <rect x="560" y="435" width="280" height="46" class="small"/>
  <text x="700" y="465" text-anchor="middle" class="t">Cron · Delegation · Kanban</text>

  <rect x="78" y="190" width="310" height="160" class="panel"/>
  <text x="232" y="242" text-anchor="middle" class="h">사용자 표면</text>
  <text x="232" y="282" text-anchor="middle" class="t">CLI / TUI / Dashboard</text>
  <text x="232" y="314" text-anchor="middle" class="t">Telegram · Discord · Slack · WhatsApp</text>

  <rect x="78" y="455" width="310" height="160" class="panel"/>
  <text x="232" y="507" text-anchor="middle" class="h">도구 실행 환경</text>
  <text x="232" y="547" text-anchor="middle" class="t">file · terminal · browser · web · vision</text>
  <text x="232" y="579" text-anchor="middle" class="t">local · Docker · SSH · Modal · Daytona</text>

  <rect x="1012" y="190" width="310" height="160" class="panel"/>
  <text x="1167" y="242" text-anchor="middle" class="h">모델 Provider</text>
  <text x="1167" y="282" text-anchor="middle" class="t">Nous Portal · OpenRouter · Anthropic</text>
  <text x="1167" y="314" text-anchor="middle" class="t">OpenAI Codex · Gemini · Copilot · Custom</text>

  <rect x="1012" y="455" width="310" height="160" class="panel"/>
  <text x="1167" y="507" text-anchor="middle" class="h">운영 가드레일</text>
  <text x="1167" y="547" text-anchor="middle" class="t">allowlist / pairing · approvals</text>
  <text x="1167" y="579" text-anchor="middle" class="t">redaction · sandbox · MCP env filtering</text>

  <path class="line" d="M388 270 C445 270 452 295 500 315"/>
  <path class="line" d="M388 535 C445 535 452 500 500 460"/>
  <path class="line" d="M900 315 C950 295 960 270 1012 270"/>
  <path class="line" d="M900 460 C950 500 960 535 1012 535"/>
  <polygon class="arrow" points="493,312 512,318 497,329"/>
  <polygon class="arrow" points="493,466 512,455 501,477"/>
  <polygon class="arrow" points="1006,266 1025,270 1009,282"/>
  <polygon class="arrow" points="1006,540 1024,535 1010,523"/>

  <rect x="505" y="620" width="390" height="58" class="chipbox"/>
  <text x="700" y="657" text-anchor="middle" class="chip">“경험 → Skill/Memory → 다음 세션에 재사용”</text>
  <text x="700" y="712" text-anchor="middle" class="muted">핵심은 챗봇 하나가 아니라, 오래 살아 있는 개인용 작업 제어판이다.</text>
</svg>
