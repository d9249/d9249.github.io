<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">LiteParse local document parsing pipeline</title>
  <desc id="desc">PDF, Office documents, and images flow through conversion, PDFium text extraction, OCR, grid projection, and then produce text, JSON bounding boxes, screenshots, and language bindings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.83 0 0 0 0 0.99 0 0 0 0.55 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowAccent" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38bdf8"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.7" opacity="0.6"/>
    </pattern>
    <style>
      .title{font:700 42px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#f8fafc;letter-spacing:-0.03em}
      .sub{font:500 18px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#cbd5e1}
      .label{font:700 22px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#f8fafc}
      .small{font:500 15px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#cbd5e1}
      .tiny{font:500 13px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#94a3b8}
      .pill{fill:#0f172a;stroke:#334155;stroke-width:2;rx:20}
      .input{fill:#082f49;stroke:#38bdf8;stroke-width:2;rx:18}
      .core{fill:#312e81;stroke:#a78bfa;stroke-width:2;rx:20}
      .ocr{fill:#7f1d1d;stroke:#fb7185;stroke-width:2;rx:18}
      .output{fill:#431407;stroke:#fb923c;stroke-width:2;rx:18}
      .binding{fill:#052e16;stroke:#34d399;stroke-width:2;rx:18}
      .arrow{stroke:#94a3b8;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .arrowAccent{stroke:#38bdf8;stroke-width:5;fill:none;marker-end:url(#arrowAccent);filter:url(#glow)}
      .dash{stroke-dasharray:8 8}
    </style>
  </defs>
  <rect width="1600" height="820" fill="url(#bg)"/>
  <rect width="1600" height="820" fill="url(#grid)" opacity="0.65"/>
  <circle cx="1420" cy="120" r="190" fill="#38bdf8" opacity="0.08"/>
  <circle cx="110" cy="710" r="180" fill="#fb923c" opacity="0.08"/>

  <text x="80" y="92" class="title">LiteParse: 로컬 문서 파싱 파이프라인</text>
  <text x="82" y="127" class="sub">PDFium + 선택적 OCR + 좌표 보존 출력으로 RAG/에이전트 워크플로에 필요한 텍스트·근거 위치·스크린샷을 만든다.</text>
  <rect x="80" y="150" width="1440" height="4" rx="2" fill="url(#accent)" opacity="0.9"/>

  <!-- Inputs -->
  <text x="110" y="218" class="label">입력</text>
  <rect x="90" y="245" width="230" height="82" class="input"/>
  <text x="122" y="284" class="label">PDF</text>
  <text x="122" y="311" class="small">native text + pages</text>
  <rect x="90" y="352" width="230" height="82" class="input"/>
  <text x="122" y="391" class="label">Office</text>
  <text x="122" y="418" class="small">DOCX · XLSX · PPTX</text>
  <rect x="90" y="459" width="230" height="82" class="input"/>
  <text x="122" y="498" class="label">Images</text>
  <text x="122" y="525" class="small">PNG · JPG · TIFF</text>

  <!-- Conversion -->
  <rect x="390" y="330" width="255" height="130" class="pill"/>
  <text x="424" y="380" class="label">형식 변환</text>
  <text x="424" y="414" class="small">LibreOffice / ImageMagick</text>
  <text x="424" y="442" class="tiny">non-PDF → PDF</text>

  <!-- Core -->
  <rect x="725" y="236" width="345" height="326" class="core"/>
  <text x="760" y="286" class="label">Rust Core</text>
  <text x="760" y="320" class="small">PDFium text extraction</text>
  <text x="760" y="352" class="small">Tesseract / HTTP OCR</text>
  <text x="760" y="384" class="small">Native text + OCR merge</text>
  <text x="760" y="416" class="small">Grid projection layout</text>
  <text x="760" y="472" class="tiny">local-first · no API key required</text>
  <rect x="758" y="492" width="276" height="38" rx="19" fill="#1e1b4b" stroke="#a78bfa" opacity="0.95"/>
  <text x="790" y="517" class="tiny">JSON pages + textItems + bboxes</text>

  <!-- OCR -->
  <rect x="724" y="596" width="346" height="86" class="ocr"/>
  <text x="760" y="632" class="label">선택적 OCR 확장</text>
  <text x="760" y="660" class="small">EasyOCR · PaddleOCR · custom /ocr</text>

  <!-- Outputs -->
  <text x="1160" y="218" class="label">출력</text>
  <rect x="1150" y="245" width="290" height="82" class="output"/>
  <text x="1184" y="284" class="label">Plain Text</text>
  <text x="1184" y="311" class="small">layout-preserved text</text>
  <rect x="1150" y="352" width="290" height="82" class="output"/>
  <text x="1184" y="391" class="label">Structured JSON</text>
  <text x="1184" y="418" class="small">bounding boxes + pages</text>
  <rect x="1150" y="459" width="290" height="82" class="output"/>
  <text x="1184" y="498" class="label">Screenshots</text>
  <text x="1184" y="525" class="small">PNG pages for visual agents</text>

  <!-- Bindings -->
  <rect x="272" y="705" width="1056" height="66" class="binding"/>
  <text x="310" y="746" class="label">Bindings / CLI</text>
  <text x="520" y="746" class="small">lit CLI · Python · Node.js/TypeScript · Rust · Browser WASM</text>

  <!-- Arrows -->
  <path d="M320 286 C350 286 360 360 390 370" class="arrow"/>
  <path d="M320 393 L390 393" class="arrowAccent"/>
  <path d="M320 500 C350 500 360 430 390 420" class="arrow"/>
  <path d="M645 395 L725 395" class="arrowAccent"/>
  <path d="M1070 286 L1150 286" class="arrow"/>
  <path d="M1070 393 L1150 393" class="arrowAccent"/>
  <path d="M1070 500 L1150 500" class="arrow"/>
  <path d="M897 562 L897 596" class="arrow dash"/>
  <path d="M897 682 L897 705" class="arrow dash"/>
  <path d="M1295 541 C1295 630 1180 705 1110 705" class="arrow dash"/>

  <text x="86" y="790" class="tiny">Evidence basis: run-llama/liteparse README and official docs, checked 2026-06-04.</text>
</svg>
