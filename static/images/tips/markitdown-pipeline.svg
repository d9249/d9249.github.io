<svg width="1400" height="760" viewBox="0 0 1400 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MarkItDown document-to-Markdown pipeline</title>
  <desc id="desc">A diagram showing files, URLs, streams, converter registry, optional Azure or LLM Vision paths, and Markdown output for LLM and RAG pipelines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0f1f35"/>
      <stop offset="100%" stop-color="#17223f"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38d5ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#77f2b2"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <style>
      .title { font: 800 50px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; letter-spacing: -1px; }
      .subtitle { font: 500 21px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #b6c6da; }
      .card-title { font: 800 24px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #eef6ff; }
      .card-text { font: 500 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #b9c7d9; }
      .small { font: 600 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #8ea4bd; }
      .mono { font: 700 17px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #d7fcff; }
      .chip { font: 700 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #06121f; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 13 7 L 1 13 z" fill="#7dd3fc"/>
    </marker>
  </defs>

  <rect width="1400" height="760" rx="0" fill="url(#bg)"/>
  <circle cx="1220" cy="80" r="230" fill="#2563eb" opacity="0.14"/>
  <circle cx="170" cy="640" r="260" fill="#14b8a6" opacity="0.12"/>
  <path d="M0 610 C230 530 365 710 600 635 C900 540 1040 610 1400 515 L1400 760 L0 760 Z" fill="#020617" opacity="0.35"/>

  <text x="70" y="90" class="title">MarkItDown</text>
  <text x="70" y="126" class="subtitle">PDF·Office·HTML·이미지·오디오·URL을 LLM/RAG가 읽기 쉬운 Markdown으로 바꾸는 Microsoft Python CLI/library</text>

  <g filter="url(#shadow)">
    <rect x="70" y="190" width="300" height="370" rx="28" fill="#0b1728" stroke="#244463" stroke-width="1.5"/>
    <text x="104" y="238" class="card-title">입력 표면</text>
    <text x="104" y="282" class="card-text">PDF · DOCX · PPTX</text>
    <text x="104" y="316" class="card-text">XLS/XLSX · CSV · JSON</text>
    <text x="104" y="350" class="card-text">HTML · XML · EPUB</text>
    <text x="104" y="384" class="card-text">이미지 EXIF/OCR</text>
    <text x="104" y="418" class="card-text">오디오·YouTube transcript</text>
    <text x="104" y="452" class="card-text">ZIP 내부 순회</text>
    <rect x="104" y="490" width="205" height="42" rx="21" fill="#162a42" stroke="#355679"/>
    <text x="126" y="517" class="mono">convert_*()</text>
  </g>

  <path d="M390 374 L500 374" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="520" y="178" width="360" height="394" rx="30" fill="#0c1b2d" stroke="#2b5576" stroke-width="1.5"/>
    <text x="560" y="228" class="card-title">Converter Registry</text>
    <text x="560" y="272" class="card-text">Magika/MIME/확장자 추론</text>
    <text x="560" y="306" class="card-text">파일별 converter 우선순위</text>
    <text x="560" y="340" class="card-text">plugin은 기본 비활성</text>
    <text x="560" y="374" class="card-text">stdin / local / URL / data URI</text>
    <rect x="560" y="420" width="280" height="42" rx="21" fill="url(#cyan)" opacity="0.95"/>
    <text x="586" y="447" class="chip">markitdown path.pdf -o out.md</text>
    <rect x="560" y="482" width="250" height="42" rx="21" fill="#172a42" stroke="#345877"/>
    <text x="586" y="509" class="mono">MarkItDown().convert()</text>
  </g>

  <path d="M900 305 L1010 258" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M900 442 L1010 494" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="1035" y="175" width="295" height="165" rx="26" fill="#111f32" stroke="#2c5876" stroke-width="1.5"/>
    <text x="1070" y="222" class="card-title">선택적 고급 경로</text>
    <text x="1070" y="262" class="card-text">Azure Document Intelligence</text>
    <text x="1070" y="294" class="card-text">Azure Content Understanding</text>
    <text x="1070" y="322" class="small">cloud API 비용·데이터 경계 확인</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1035" y="412" width="295" height="165" rx="26" fill="#111f32" stroke="#2c5876" stroke-width="1.5"/>
    <text x="1070" y="459" class="card-title">Plugin / LLM Vision</text>
    <text x="1070" y="499" class="card-text">markitdown-ocr</text>
    <text x="1070" y="531" class="card-text">OpenAI-compatible client</text>
    <text x="1070" y="559" class="small">키·쿼터·민감 이미지 전송 주의</text>
  </g>

  <path d="M700 592 L700 654" stroke="#86efac" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="438" y="650" width="525" height="68" rx="34" fill="url(#green)" opacity="0.96"/>
    <text x="485" y="693" style="font: 900 24px Inter, ui-sans-serif, system-ui; fill: #062011;">Markdown output → indexing · search · LLM context · RAG preprocessing</text>
  </g>

  <text x="70" y="706" class="small">MIT · Python 3.10+ · PyPI package: markitdown 0.1.6 · repo: microsoft/markitdown</text>
</svg>
